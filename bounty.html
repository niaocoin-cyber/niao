<style>
/* === BASE STYLES (preserved from original) === */
:root{
  --gold:#F5A623;--gold-light:#FFD700;--gold-dark:#B8860B;
  --bg:#08080C;--bg2:#0E0E14;--bg3:#14141E;
  --text:#E8E6E3;--text-dim:#7A7A8A;
  --card:#111118;--card-border:#1E1E2A;
  --red:#E74C3C;--green:#2ECC71;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--gold-dark) var(--bg)}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.7;overflow-x:hidden}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:3px}

/* TOP BAR */
.top-bar{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(8,8,12,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--card-border);display:flex;align-items:center;justify-content:space-between;padding:.7rem 2rem;height:60px}
.top-bar .left-group{display:flex;align-items:center;gap:1.5rem}
.top-bar .logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;color:var(--gold)}
.top-bar .logo span{font-family:'Orbitron',monospace;font-weight:900;font-size:1.1rem;letter-spacing:2px}
.top-bar .center-group{display:flex;align-items:center;gap:1.5rem;position:absolute;left:50%;transform:translateX(-50%)}
.top-bar .nav-tabs{display:flex;gap:.3rem;margin-left:1.5rem}
.top-bar .nav-tab{background:none;border:none;color:var(--text-dim);font-size:1.1rem;font-weight:900;padding:.35rem .9rem;cursor:pointer;position:relative;transition:color .3s;font-family:'Noto Sans SC',sans-serif;border-radius:6px}
.top-bar .nav-tab.active{background:rgba(245,166,35,.08);background-image:linear-gradient(135deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.top-bar .nav-tab:hover{color:var(--gold-light)}
.back-btn{display:flex;align-items:center;gap:.4rem;color:var(--text-dim);text-decoration:none;font-size:.85rem;transition:color .3s;cursor:pointer;background:none;border:none}
.back-btn:hover{color:var(--gold)}
.user-area{display:flex;align-items:center;gap:1rem}
.lang-toggle{background:rgba(245,166,35,.08);border:1px solid var(--gold-dark);color:var(--text);font-size:.75rem;padding:.3rem .7rem;border-radius:6px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;transition:all .3s;display:flex;align-items:center;gap:.2rem}
.lang-toggle:hover{border-color:var(--gold);box-shadow:0 0 12px rgba(245,166,35,.15)}
.lang-toggle .lang-active{color:var(--gold);font-weight:900}
.lang-toggle .lang-inactive{color:var(--text-dim);font-weight:400}
.login-btn{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000;border:none;padding:.45rem 1.4rem;border-radius:8px;font-weight:800;font-size:.8rem;cursor:pointer;letter-spacing:1px;transition:all .3s;font-family:'Noto Sans SC',sans-serif}
.login-btn:hover{box-shadow:0 4px 20px rgba(245,166,35,.4);transform:translateY(-1px)}
.user-avatar-btn{display:flex;align-items:center;gap:.6rem;cursor:pointer;position:relative;background:none;border:none;color:var(--text)}
.user-avatar-btn img{width:34px;height:34px;border-radius:50%;border:2px solid var(--gold);object-fit:cover}
.user-avatar-btn .nick{font-size:.85rem;font-weight:700}

.main-wrap{margin-top:60px;padding:1.5rem 2rem 3rem}
.tab-panel{display:none}
.tab-panel.active{display:block;animation:fadeUp .35s ease}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:.6}}
@keyframes crownPulse{0%,100%{filter:drop-shadow(0 0 4px currentColor) brightness(1)}50%{filter:drop-shadow(0 0 10px currentColor) brightness(1.3)}}

/* TASK CARDS */
.task-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.2rem}
.task-card{background:var(--card);border:1px solid var(--card-border);border-radius:14px;padding:1.4rem;transition:all .35s;position:relative;overflow:hidden;cursor:pointer}
.task-card:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 12px 40px rgba(245,166,35,.1)}
.task-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold-dark));opacity:0;transition:opacity .3s}
.task-card:hover::before{opacity:1}
.task-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.8rem}
.task-title{font-weight:900;font-size:1.05rem;flex:1;margin-right:.8rem}
.task-reward{font-family:'Orbitron',monospace;font-size:1rem;color:var(--gold);font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:.3rem}
.task-reward .coin{font-size:.7rem;color:var(--gold-dark)}
.task-meta{display:flex;gap:1rem;font-size:.78rem;color:var(--text-dim);margin-bottom:.8rem;flex-wrap:wrap}
.task-meta span{display:flex;align-items:center;gap:.3rem}
.task-desc{font-size:.88rem;color:var(--text-dim);line-height:1.7;margin-bottom:1rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.task-footer{display:flex;justify-content:space-between;align-items:center}
.task-publisher{display:flex;align-items:center;gap:.5rem;font-size:.78rem;color:var(--text-dim)}
.task-publisher img{width:22px;height:22px;border-radius:50%;border:1px solid var(--card-border);object-fit:cover}
.accept-btn{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000;border:none;padding:.4rem 1.2rem;border-radius:8px;font-weight:800;font-size:.75rem;cursor:pointer;transition:all .3s;letter-spacing:.5px;font-family:'Noto Sans SC',sans-serif}
.accept-btn:hover{box-shadow:0 4px 15px rgba(245,166,35,.4)}
.accept-btn:disabled{opacity:.5;cursor:not-allowed}
.task-status{font-size:.7rem;padding:.2rem .7rem;border-radius:20px;font-weight:700;letter-spacing:.5px}
.status-open{background:rgba(46,204,113,.12);color:var(--green)}
.status-full{background:rgba(231,76,60,.12);color:var(--red)}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:2000;display:none;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--card-border);border-radius:18px;padding:2rem;width:90%;max-width:500px;position:relative;max-height:90vh;overflow-y:auto}
.modal h2{font-family:'Orbitron',monospace;font-size:1.1rem;color:var(--gold);margin-bottom:1.5rem;letter-spacing:1px}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--text-dim);font-size:1.4rem;cursor:pointer;transition:color .3s;line-height:1}
.modal-close:hover{color:var(--gold)}
.form-group{margin-bottom:1.2rem}
.form-group label{display:block;font-size:.8rem;color:var(--text-dim);margin-bottom:.4rem;letter-spacing:.5px;font-weight:700}
.form-group input,.form-group textarea,.form-group select{width:100%;background:var(--bg3);border:1px solid var(--card-border);border-radius:10px;padding:.7rem 1rem;color:var(--text);font-size:.9rem;font-family:'Noto Sans SC',sans-serif;transition:border-color .3s;outline:none}
.form-group input:focus,.form-group textarea:focus{border-color:var(--gold)}
.form-group textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.publish-submit{width:100%;padding:.75rem;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000;border:none;border-radius:10px;font-weight:900;font-size:.95rem;cursor:pointer;transition:all .3s;margin-top:.5rem;letter-spacing:1px;font-family:'Noto Sans SC',sans-serif}
.publish-submit:hover{box-shadow:0 6px 25px rgba(245,166,35,.4);transform:translateY(-1px)}

/* AUTH TABS */
.auth-tabs{display:flex;gap:.5rem;margin-bottom:1.2rem;border-bottom:1px solid var(--card-border)}
.auth-tab{flex:1;padding:.6rem;border:none;background:none;color:var(--text-dim);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .3s;border-bottom:2px solid transparent}
.auth-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.auth-tab:hover{color:var(--text)}
.auth-input{width:100%;background:var(--bg3);border:1px solid var(--card-border);border-radius:10px;padding:.85rem 1rem;color:var(--text);font-size:.9rem;margin-bottom:.7rem;outline:none;transition:border-color .3s}
.auth-input:focus{border-color:var(--gold)}
.auth-input::placeholder{color:var(--text-dim)}
.auth-submit-btn{width:100%;padding:.85rem;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000;border:none;border-radius:10px;font-weight:900;font-size:.9rem;cursor:pointer;transition:all .3s;margin-top:.5rem}
.auth-submit-btn:hover{box-shadow:0 6px 25px rgba(245,166,35,.4);transform:translateY(-1px)}

/* CUSTOM MODAL */
.custom-modal{position:fixed;inset:0;z-index:3000;display:flex;align-items:center;justify-content:center}
.custom-modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(10px)}
.custom-modal-content{position:relative;background:var(--bg2);border:1px solid var(--card-border);border-radius:16px;padding:0;width:90%;max-width:400px;overflow:hidden;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.custom-modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.5rem;border-bottom:1px solid var(--card-border)}
.custom-modal-header h3{font-size:1rem;color:var(--gold);font-weight:700;margin:0}
.custom-modal-close{background:none;border:none;color:var(--text-dim);font-size:1.5rem;cursor:pointer;transition:color .3s;line-height:1;padding:0}
.custom-modal-close:hover{color:var(--gold)}
.custom-modal-body{padding:1.5rem}
.custom-modal-footer{display:flex;gap:.8rem;padding:1.2rem 1.5rem;border-top:1px solid var(--card-border)}
.custom-input{width:100%;background:var(--bg3);border:1px solid var(--card-border);border-radius:10px;padding:.8rem 1rem;color:var(--text);font-size:.95rem;font-family:'Noto Sans SC',sans-serif;transition:border-color .3s;outline:none;text-align:center}
.custom-input:focus{border-color:var(--gold)}
.custom-btn{flex:1;padding:.75rem;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .3s;font-family:'Noto Sans SC',sans-serif;border:none}
.custom-btn-cancel{background:var(--bg3);color:var(--text-dim)}
.custom-btn-cancel:hover{background:var(--card-border)}
.custom-btn-confirm{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000;font-weight:900}
.custom-btn-confirm:hover{box-shadow:0 4px 20px rgba(245,166,35,.3);transform:translateY(-1px)}

/* PROFILE DROPDOWN */
.profile-dropdown{position:absolute;top:calc(100% + 10px);right:0;background:var(--bg2);border:1px solid var(--card-border);border-radius:14px;padding:1.2rem;width:280px;z-index:3000;display:none;animation:fadeUp .25s ease;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.profile-dropdown.show{display:block}
.profile-top{display:flex;align-items:center;gap:.8rem;padding-bottom:1rem;border-bottom:1px solid var(--card-border);margin-bottom:.8rem}
.profile-top img{width:48px;height:48px;border-radius:50%;border:2px solid var(--gold);object-fit:cover}
.profile-info .pf-nick{font-weight:900;font-size:.95rem}
.profile-info .pf-x{font-size:.75rem;color:var(--text-dim);display:flex;align-items:center;gap:.3rem;margin-top:.15rem}
.profile-stat{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;font-size:.85rem}
.profile-stat .label{color:var(--text-dim)}
.profile-stat .val{font-family:'Orbitron',monospace;font-weight:700;color:var(--gold)}
.recharge-btn{width:100%;padding:.5rem;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);border-radius:8px;color:var(--gold);font-weight:700;font-size:.8rem;cursor:pointer;transition:all .3s;margin-top:.5rem;font-family:'Noto Sans SC',sans-serif}
.recharge-btn:hover{background:rgba(245,166,35,.2);border-color:var(--gold)}
.logout-btn{width:100%;padding:.5rem;background:none;border:1px solid var(--card-border);border-radius:8px;color:var(--text-dim);font-size:.78rem;cursor:pointer;transition:all .3s;margin-top:.5rem;font-family:'Noto Sans SC',sans-serif}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

.login-modal .modal{max-width:380px;text-align:center}
.login-modal .modal h2{margin-bottom:.5rem}
.login-modal .login-sub{font-size:.82rem;color:var(--text-dim);margin-bottom:1.5rem}
.wallet-connect-btn{display:flex;align-items:center;gap:.8rem;width:100%;padding:.8rem 1.2rem;background:var(--bg3);border:1px solid var(--card-border);border-radius:12px;color:var(--text);font-size:.95rem;font-weight:700;cursor:pointer;transition:all .3s;font-family:'Noto Sans SC',sans-serif}
.wallet-connect-btn:hover{border-color:var(--gold);background:rgba(245,166,35,.08);box-shadow:0 4px 15px rgba(245,166,35,.15)}
.wallet-connect-btn img,.wallet-connect-btn svg{flex-shrink:0}

/* LEADERBOARD */
.lb-toggle{display:flex;gap:.5rem;margin-bottom:1.5rem;justify-content:center}
.lb-toggle button{background:var(--card);border:1px solid var(--card-border);color:var(--text-dim);padding:.5rem 1.2rem;border-radius:8px;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .3s;font-family:'Noto Sans SC',sans-serif}
.lb-toggle button.active{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000;border-color:var(--gold)}
.lb-toggle button:hover:not(.active){border-color:var(--gold);color:var(--gold-light)}
.lb-list{max-width:600px;margin:0 auto}
.lb-item{display:flex;align-items:center;gap:1rem;padding:.9rem 1rem;background:var(--card);border:1px solid var(--card-border);border-radius:12px;margin-bottom:.6rem;transition:all .3s}
.lb-item:hover{border-color:var(--gold);box-shadow:0 4px 20px rgba(245,166,35,.08)}
.lb-rank{width:32px;text-align:center;font-family:'Orbitron',monospace;font-weight:900;font-size:.9rem;color:var(--text-dim);flex-shrink:0}
.lb-item:nth-child(1) .lb-rank,.lb-item:nth-child(2) .lb-rank,.lb-item:nth-child(3) .lb-rank{font-size:1.3rem}
.lb-avatar{width:38px;height:38px;border-radius:50%;border:2px solid var(--card-border);object-fit:cover;flex-shrink:0}
.lb-item:nth-child(1) .lb-avatar{border-color:#FFD700}
.lb-item:nth-child(2) .lb-avatar{border-color:#C0C0C0}
.lb-item:nth-child(3) .lb-avatar{border-color:#CD7F32}
.lb-nick{flex:1;font-weight:700;font-size:.9rem}
.lb-amount{font-family:'Orbitron',monospace;font-weight:700;color:var(--gold);font-size:.9rem}

/* FAB */
.fab-publish{position:fixed;bottom:2rem;right:2rem;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000;border:none;font-size:1.6rem;font-weight:900;cursor:pointer;box-shadow:0 6px 30px rgba(245,166,35,.4);transition:all .3s;z-index:900;display:flex;align-items:center;justify-content:center}
.fab-publish:hover{transform:scale(1.1) translateY(-2px);box-shadow:0 10px 40px rgba(245,166,35,.5)}

/* RECHARGE */
.recharge-modal .modal{max-width:360px;text-align:center}
.recharge-amounts{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin:1rem 0}
.recharge-amt{background:var(--bg3);border:1px solid var(--card-border);border-radius:10px;padding:.6rem;cursor:pointer;transition:all .3s;font-family:'Orbitron',monospace;font-weight:700;color:var(--text);font-size:.9rem}
.recharge-amt:hover,.recharge-amt.sel{border-color:var(--gold);color:var(--gold);background:rgba(245,166,35,.08)}
.recharge-confirm{width:100%;padding:.65rem;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000;border:none;border-radius:10px;font-weight:900;font-size:.9rem;cursor:pointer;margin-top:.5rem;font-family:'Noto Sans SC',sans-serif}

.empty-state{text-align:center;padding:4rem 1rem;color:var(--text-dim)}
.empty-state .empty-icon{font-size:3rem;margin-bottom:1rem;opacity:.4}
.empty-state p{font-size:.95rem}

/* === NEW: Task type checkbox pills === */
.task-type-group{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.3rem}
.task-type-check{display:flex;align-items:center;gap:.35rem;padding:.4rem .9rem;border-radius:20px;background:var(--bg3);border:1px solid var(--card-border);cursor:pointer;transition:all .3s;font-size:.82rem;color:var(--text-dim);user-select:none}
.task-type-check:hover{border-color:var(--gold);color:var(--text)}
.task-type-check.selected{border-color:var(--gold);background:rgba(245,166,35,.12);color:var(--gold);font-weight:700}
.task-type-check input[type=checkbox]{display:none}
.calc-total{display:flex;justify-content:space-between;align-items:center;padding:.7rem 1rem;background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.15);border-radius:10px;margin-bottom:1rem}
.calc-total .calc-label{font-size:.82rem;color:var(--text-dim)}
.calc-total .calc-value{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:900;color:var(--gold)}

/* === NEW: Task card action badges === */
.task-action-tags{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.6rem}
.task-action-tag{font-size:.68rem;padding:.15rem .5rem;border-radius:12px;font-weight:700;letter-spacing:.3px}
.tag-like{background:rgba(231,76,60,.12);color:#E74C3C}
.tag-comment{background:rgba(52,152,219,.12);color:#3498DB}
.tag-retweet{background:rgba(46,204,113,.12);color:#2ECC71}
.tag-follow{background:rgba(155,89,182,.12);color:#9B59B6}

/* === NEW: Task detail modal === */
.task-detail-modal .modal{max-width:600px}
.detail-desc{font-size:.92rem;line-height:1.8;color:var(--text);margin-bottom:1.2rem;white-space:pre-wrap}
.detail-actions{display:flex;flex-wrap:wrap;gap:.6rem;margin-bottom:1.2rem}
.detail-action-btn{display:flex;align-items:center;gap:.4rem;padding:.55rem 1.2rem;border-radius:10px;font-weight:800;font-size:.82rem;cursor:pointer;transition:all .3s;font-family:'Noto Sans SC',sans-serif;border:none}
.detail-action-btn.btn-like{background:rgba(231,76,60,.15);color:#E74C3C;border:1px solid rgba(231,76,60,.3)}
.detail-action-btn.btn-comment{background:rgba(52,152,219,.15);color:#3498DB;border:1px solid rgba(52,152,219,.3)}
.detail-action-btn.btn-retweet{background:rgba(46,204,113,.15);color:#2ECC71;border:1px solid rgba(46,204,113,.3)}
.detail-action-btn.btn-follow{background:rgba(155,89,182,.15);color:#9B59B6;border:1px solid rgba(155,89,182,.3)}
.detail-action-btn:hover{transform:translateY(-1px);filter:brightness(1.2)}
.detail-action-btn.completed{opacity:.7;position:relative}
.detail-action-btn.completed::after{content:'✓';position:absolute;right:-6px;top:-6px;background:var(--green);color:#fff;width:16px;height:16px;border-radius:50%;font-size:.6rem;display:flex;align-items:center;justify-content:center}
.completion-status{padding:.5rem .8rem;border-radius:8px;font-size:.82rem;font-weight:700;margin-bottom:1rem;text-align:center}
.completion-done{background:rgba(46,204,113,.12);color:var(--green);border:1px solid rgba(46,204,113,.25)}
.completion-pending{background:rgba(231,76,60,.12);color:var(--red);border:1px solid rgba(231,76,60,.25)}
.completion-reward{font-family:'Orbitron',monospace;color:var(--gold);margin-left:.3rem}
.detail-info-row{display:flex;gap:1.2rem;flex-wrap:wrap;font-size:.8rem;color:var(--text-dim);margin-bottom:1rem}
.detail-info-row span{display:flex;align-items:center;gap:.3rem}

/* === NEW: Special bounty card === */
.task-card.bounty-special{border:2px solid transparent;background-image:linear-gradient(var(--card),var(--card)),linear-gradient(135deg,var(--gold),#E74C3C,#9B59B6,var(--gold));background-origin:border-box;background-clip:padding-box,border-box;animation:none}
.task-card.bounty-special:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(155,89,182,.2)}
.bounty-badge{display:inline-flex;align-items:center;gap:.3rem;font-size:.68rem;padding:.2rem .6rem;border-radius:12px;background:linear-gradient(135deg,#E74C3C,#9B59B6);color:#fff;font-weight:800;letter-spacing:.5px;margin-bottom:.5rem}
.submission-area{margin-top:1rem;border-top:1px solid var(--card-border);padding-top:1rem}
.submission-area textarea{width:100%;background:var(--bg3);border:1px solid var(--card-border);border-radius:10px;padding:.7rem 1rem;color:var(--text);font-size:.88rem;font-family:'Noto Sans SC',sans-serif;resize:vertical;min-height:120px;outline:none;transition:border-color .3s}
.submission-area textarea:focus{border-color:var(--gold)}
.submission-char-count{text-align:right;font-size:.72rem;color:var(--text-dim);margin-top:.3rem}
.submission-submit{margin-top:.6rem;padding:.5rem 1.5rem;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000;border:none;border-radius:8px;font-weight:800;font-size:.82rem;cursor:pointer;transition:all .3s;font-family:'Noto Sans SC',sans-serif}
.submission-submit:hover{box-shadow:0 4px 15px rgba(245,166,35,.4)}
.submission-list{margin-top:1.2rem}
.submission-item{background:var(--bg3);border:1px solid var(--card-border);border-radius:10px;padding:.8rem 1rem;margin-bottom:.6rem}
.submission-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem}
.submission-item-nick{font-weight:700;font-size:.82rem;color:var(--gold)}
.submission-item-time{font-size:.7rem;color:var(--text-dim)}
.submission-item-text{font-size:.85rem;color:var(--text);line-height:1.7;white-space:pre-wrap;word-break:break-word}

/* === NEW: FAB menu === */
.fab-menu{position:fixed;bottom:5.5rem;right:2rem;display:none;flex-direction:column;gap:.5rem;z-index:900;animation:fadeUp .2s ease}
.fab-menu.show{display:flex}
.fab-menu-item{display:flex;align-items:center;gap:.5rem;padding:.6rem 1.2rem;background:var(--bg2);border:1px solid var(--card-border);border-radius:12px;color:var(--text);font-size:.85rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .3s;font-family:'Noto Sans SC',sans-serif;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.fab-menu-item:hover{border-color:var(--gold);background:rgba(245,166,35,.08)}
.fab-menu-item.bounty-item{border-color:rgba(155,89,182,.3);background:rgba(155,89,182,.08)}
.fab-menu-item.bounty-item:hover{border-color:#9B59B6}

/* DASHBOARD */
.dash-container{max-width:560px;margin:0 auto}
.dash-profile-card{background:var(--card);border:1px solid var(--card-border);border-radius:18px;padding:2rem;display:flex;align-items:center;gap:1.5rem;margin-bottom:1.5rem;position:relative;overflow:hidden}
.dash-profile-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-dark),var(--gold-light))}
.dash-avatar-wrap img{width:72px;height:72px;border-radius:50%;border:3px solid var(--gold);object-fit:cover;box-shadow:0 0 20px rgba(245,166,35,.2)}
.dash-user-info{flex:1}
.dash-nickname{font-weight:900;font-size:1.3rem;margin-bottom:.4rem;background:linear-gradient(135deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.dash-x-account{font-size:.82rem;color:var(--text-dim);display:flex;align-items:center;gap:.4rem}
.dash-x-account svg{flex-shrink:0}
.dash-x-unbound{color:var(--red);font-size:.78rem;padding:.15rem .6rem;background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.2);border-radius:20px}
.dash-edit-nick-btn{background:none;border:1px solid var(--card-border);color:var(--text-dim);font-size:.7rem;padding:.2rem .6rem;border-radius:6px;cursor:pointer;margin-top:.4rem;transition:all .3s;font-family:'Noto Sans SC',sans-serif}
.dash-edit-nick-btn:hover{border-color:var(--gold);color:var(--gold)}
.dash-avatar-wrap{position:relative;cursor:pointer}
.dash-avatar-edit{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s}
.dash-avatar-wrap:hover .dash-avatar-edit{opacity:1}
.dash-x-bind-btn{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000;border:none;padding:.25rem .7rem;border-radius:20px;font-size:.7rem;font-weight:700;cursor:pointer;transition:all .3s;margin-left:auto}
.dash-x-bind-btn:hover{box-shadow:0 4px 15px rgba(245,166,35,.4);transform:translateY(-1px)}
.dash-x-bound{color:var(--green);font-size:.78rem}
.dash-balance-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem}
.dash-balance-card{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:1.5rem;text-align:center;transition:all .35s;position:relative;overflow:hidden}
.dash-balance-card:hover{border-color:var(--gold);box-shadow:0 8px 30px rgba(245,166,35,.08)}
.dash-balance-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold-dark));opacity:0;transition:opacity .3s}
.dash-balance-card:hover::before{opacity:1}
.dash-balance-label{font-size:.82rem;color:var(--text-dim);font-weight:700;margin-bottom:.8rem;letter-spacing:.5px}
.dash-balance-value{font-family:'Orbitron',monospace;font-size:1.6rem;font-weight:900;color:var(--gold);margin-bottom:1rem}
.dash-balance-actions{display:flex;gap:.6rem;justify-content:center}
.dash-action-btn{padding:.5rem 1.2rem;border-radius:10px;font-weight:800;font-size:.8rem;cursor:pointer;transition:all .3s;font-family:'Noto Sans SC',sans-serif;letter-spacing:.5px;border:none}
.dash-claim-btn{background:linear-gradient(135deg,var(--green),#27ae60);color:#fff}
.dash-claim-btn:hover{box-shadow:0 4px 15px rgba(46,204,113,.4);transform:translateY(-1px)}
.dash-topup-btn{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000}
.dash-topup-btn:hover{box-shadow:0 4px 15px rgba(245,166,35,.4);transform:translateY(-1px)}
.dash-withdraw-btn{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);color:var(--gold)}
.dash-withdraw-btn:hover{background:rgba(245,166,35,.2);border-color:var(--gold);transform:translateY(-1px)}
@media(max-width:640px){
  .dash-balance-grid{grid-template-columns:1fr}
  .dash-profile-card{flex-direction:column;text-align:center}
}

.page-bg{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
.page-bg .dot{position:absolute;width:2px;height:2px;background:var(--gold);border-radius:50%;opacity:0;animation:twinkle var(--d,4s) var(--delay,0s) infinite}

@media(max-width:640px){
  .main-wrap{padding:1rem}
  .task-grid{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .top-bar{padding:.7rem 1rem}
  .top-bar .center-group{position:static;transform:none;gap:.8rem;flex:1;justify-content:center}
  .top-bar .page-tag{display:none}
  .top-bar .page-title{font-size:.85rem}
  .top-bar .nav-tabs{margin-left:.8rem}
  .top-bar .nav-tab{font-size:.75rem;padding:.3rem .6rem}
  .lb-list{width:100%}
  .profile-dropdown{right:-1rem;width:260px}
}
</style>
</head>
<body>
<!-- Background sparkles -->
<div class="page-bg" id="pageBg"></div>

<!-- Top Bar -->
<header class="top-bar">
  <div class="left-group">
    <a class="logo" href="index.html"><span>NIAO</span></a>
    <button class="back-btn" onclick="history.back()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      <span class="back-text">返回</span>
    </button>
    <button class="lang-toggle" id="langToggle" onclick="toggleLang()"><span class="lang-active">中</span> / <span class="lang-inactive">EN</span></button>
  </div>
  <div class="center-group">
    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="tasks">任务</button>
      <button class="nav-tab" data-tab="leaderboard">排行榜</button>
      <button class="nav-tab" data-tab="dashboard" id="dashboardTab">个人仪表盘</button>
    </div>
  </div>
  <div class="user-area" id="userArea"></div>
</header>

<!-- Main -->
<div class="main-wrap">
  <!-- Tasks Panel -->
  <div class="tab-panel active" id="panel-tasks">
    <div class="task-grid" id="taskGrid"></div>
    <div class="empty-state" id="emptyTasks" style="display:none">
      <div class="empty-icon">&#128270;</div>
      <p>暂无悬赏任务，登录后可发布任务</p>
    </div>
  </div>

  <!-- Leaderboard Panel -->
  <div class="tab-panel" id="panel-leaderboard">
    <div class="lb-toggle">
      <button class="active" data-lb="earn">赚NIAO排行</button>
      <button data-lb="spend">撒NIAO排行</button>
    </div>
    <div class="lb-list" id="lbList"></div>
  </div>

  <!-- Dashboard Panel -->
  <div class="tab-panel" id="panel-dashboard">
    <div class="dash-container">
      <div class="dash-not-logged" id="dashNotLogged">
        <div class="empty-state">
          <div class="empty-icon">&#128100;</div>
          <p>请先登录以查看个人仪表盘</p>
          <button class="login-btn" style="margin-top:1rem" onclick="openModal('loginModal')">登录</button>
        </div>
      </div>
      <div class="dash-content" id="dashContent" style="display:none">
        <div class="dash-profile-card">
          <div class="dash-avatar-wrap" onclick="editAvatar()"><img id="dashAvatar" src="" alt=""><div class="dash-avatar-edit"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div></div>
          <div class="dash-user-info">
            <div class="dash-nickname" id="dashNick"></div>
            <button class="dash-edit-nick-btn" onclick="editNickname()" id="dashEditNickBtn">修改昵称</button>
            <div class="dash-x-account" id="dashXAccountWrap">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
              <span id="dashXText"></span>
              <button class="dash-x-bind-btn" id="dashXBindBtn" onclick="openModal('bindXModal')">立即绑定</button>
            </div>
          </div>
        </div>
        <div class="dash-balance-grid" style="grid-template-columns:1fr">
          <div class="dash-balance-card">
            <div class="dash-balance-label" id="dashTotalLabel">总 NIAO 余额</div>
            <div class="dash-balance-value" id="dashAvailable">0</div>
            <div style="margin-top:1rem;font-size:.85rem;color:var(--text-dim)">
              <div style="margin-bottom:.5rem"><span id="dashNonWithdrawLabel">不可提现</span>: <span id="dashNonWithdrawable" style="color:var(--gold)">0</span></div>
              <div><span id="dashWithdrawLabel">可提现</span>: <span id="dashWithdrawable" style="color:var(--green)">0</span></div>
            </div>
            <div class="dash-balance-actions">
              <button class="dash-action-btn dash-topup-btn" id="dashTopupBtn" onclick="openModal('rechargeModal')">充值</button>
              <button class="dash-action-btn dash-withdraw-btn" id="dashWithdrawBtn" onclick="openModal('withdrawModal')">提现</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- FAB Publish -->
<button class="fab-publish" id="fabPublish" title="发布任务" style="display:none">+</button>
<!-- FAB Menu -->
<div class="fab-menu" id="fabMenu">
  <button class="fab-menu-item" id="fabPublishSocial" onclick="openPublishSocial()">&#128279; 发布社交任务</button>
  <button class="fab-menu-item bounty-item" id="fabPublishBounty" onclick="openPublishBounty()">&#127942; 发布特殊悬赏</button>
</div>

<!-- Login Modal -->
<div class="modal-overlay login-modal" id="loginModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('loginModal')">&times;</button>
    <h2 id="loginModalTitle">登录</h2>
    <div id="googleLoginBtn" style="text-align: center; margin: 2rem 0;">
      <button class="wallet-connect-btn" onclick="doGoogleSignIn()" style="width: 100%;">
        <svg width="28" height="28" viewBox="0 0 24 24" style="margin-right: 0.5rem;">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        使用Google账号登录
      </button>
    </div>
  </div>
</div>

<!-- Bind X Account Modal -->
<div class="modal-overlay" id="bindXModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('bindXModal')">&times;</button>
    <h2>绑定 X 账号</h2>
    <p style="font-size:.85rem;color:var(--text-dim);margin-bottom:1rem">使用 X (Twitter) 授权绑定账号，用于参与社交任务</p>
    <div style="text-align:center;margin:1.5rem 0">
      <button class="wallet-connect-btn" onclick="doBindX()" style="width:100%">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        授权绑定 X 账号
      </button>
    </div>
    <div style="font-size:.75rem;color:var(--text-dim);margin-bottom:1rem;padding:.8rem;background:var(--bg3);border-radius:8px;line-height:1.6">
      <b>提示：</b>点击上方按钮将打开 X 授权页面，授权后即可绑定账号。
    </div>
  </div>
</div>

<!-- Publish Social Task Modal -->
<div class="modal-overlay" id="publishSocialModal">
  <div class="modal" style="max-width:520px">
    <button class="modal-close" onclick="closeModal('publishSocialModal')">&times;</button>
    <h2 id="pubSocialTitle">发布社交任务</h2>
    <div class="form-group">
      <label id="pubSocialDescLabel">任务内容</label>
      <textarea id="pubSocialDesc" placeholder="描述你的任务内容..." maxlength="500"></textarea>
    </div>
    <div class="form-group">
      <label id="pubTaskTypeLabel">选择任务类型</label>
      <div class="task-type-group" id="taskTypeGroup">
        <div class="task-type-check" data-action="like" onclick="toggleTaskType(this)"><input type="checkbox"> <span id="pubLikeLabel">点赞</span></div>
        <div class="task-type-check" data-action="comment" onclick="toggleTaskType(this)"><input type="checkbox"> <span id="pubCommentLabel">评论</span></div>
        <div class="task-type-check" data-action="retweet" onclick="toggleTaskType(this)"><input type="checkbox"> <span id="pubRetweetLabel">转发</span></div>
        <div class="task-type-check" data-action="follow" onclick="toggleTaskType(this)"><input type="checkbox"> <span id="pubFollowLabel">关注</span></div>
      </div>
    </div>
    <div class="form-group" id="tweetUrlGroup">
      <label id="pubTweetUrlLabel">推文链接</label>
      <input type="url" id="pubTweetUrl" placeholder="https://x.com/user/status/123456...">
    </div>
    <div class="form-group" id="profileUrlGroup" style="display:none">
      <label id="pubProfileUrlLabel">X 账号主页链接</label>
      <input type="url" id="pubProfileUrl" placeholder="https://x.com/username">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label id="pubParticipantsLabel">参与人数</label>
        <input type="number" id="pubParticipants" placeholder="10" min="1" max="9999" oninput="calcTotal()">
      </div>
      <div class="form-group">
        <label id="pubNiaoPerPersonLabel">每人 NIAO 数量</label>
        <input type="number" id="pubNiaoPerPerson" placeholder="50" min="1" oninput="calcTotal()">
      </div>
    </div>
    <div class="calc-total">
      <span class="calc-label" id="pubTotalLabel">任务总 NIAO 数量</span>
      <span class="calc-value" id="calcTotalValue">0 NIAO</span>
    </div>
    <button class="publish-submit" onclick="doPublishSocial()" id="pubSocialSubmit">发布任务</button>
  </div>
</div>

<!-- Publish Special Bounty Modal -->
<div class="modal-overlay" id="publishBountyModal">
  <div class="modal" style="max-width:520px">
    <button class="modal-close" onclick="closeModal('publishBountyModal')">&times;</button>
    <h2 style="background:linear-gradient(135deg,#E74C3C,#9B59B6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text" id="pubBountyTitle">发布特殊悬赏</h2>
    <div class="form-group">
      <label id="pubBountyDescLabel">悬赏任务描述</label>
      <textarea id="pubBountyDesc" placeholder="详细描述你的悬赏任务要求..." style="min-height:100px" maxlength="2000"></textarea>
    </div>
    <div class="form-group">
      <label id="pubBountyReqsLabel">文章要求说明</label>
      <textarea id="pubBountyReqs" placeholder="例如：需要原创文章，主题为NIAO生态分析，包含数据图表..." maxlength="1000"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label id="pubBountyWordCountLabel">最低字数要求</label>
        <input type="number" id="pubBountyWordCount" placeholder="1500" min="100">
      </div>
      <div class="form-group">
        <label id="pubBountySlotsLabel">参与人数</label>
        <input type="number" id="pubBountySlots" placeholder="5" min="1" max="999">
      </div>
    </div>
    <div class="form-group">
      <label id="pubBountyRewardLabel">悬赏 NIAO 总额</label>
      <input type="number" id="pubBountyReward" placeholder="1000" min="1">
    </div>
    <button class="publish-submit" onclick="doPublishBounty()" style="background:linear-gradient(135deg,#E74C3C,#9B59B6)" id="pubBountySubmit">发布特殊悬赏</button>
  </div>
</div>

<!-- Task Detail Modal -->
<div class="modal-overlay task-detail-modal" id="taskDetailModal">
  <div class="modal" style="max-width:620px">
    <button class="modal-close" onclick="closeModal('taskDetailModal')">&times;</button>
    <div id="taskDetailContent"></div>
  </div>
</div>

<!-- Recharge Modal -->
<div class="modal-overlay recharge-modal" id="rechargeModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('rechargeModal')">&times;</button>
    <h2 id="rechargeTitle">余额充值</h2>
    <p style="font-size:.85rem;color:var(--text-dim);margin-bottom:1rem" id="rechargeDesc">输入充值数量</p>
    <div class="form-group">
      <label id="rechargeAmountLabel">充值数量 (NIAO)</label>
      <input type="number" id="rechargeAmount" placeholder="请输入充值数量" min="1">
    </div>
    <div style="font-size:.75rem;color:var(--text-dim);margin-bottom:1rem;padding:.8rem;background:var(--bg3);border-radius:8px;line-height:1.6">
      <b id="rechargeHintTitle">提示：</b><span id="rechargeHint">点击确认后将唤起钱包进行支付，请确保您有足够的代币余额。</span>
    </div>
    <button class="recharge-confirm" onclick="doRecharge()" id="rechargeConfirmBtn">确认充值</button>
  </div>
</div>

<!-- Toast Notification -->
<div id="toastNotification" style="position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--card-border);border-radius:12px;padding:.8rem 1.2rem;color:var(--text);font-size:.9rem;box-shadow:0 8px 30px rgba(0,0,0,.4);z-index:9999;display:none;animation:fadeUp .3s ease">
  <span id="toastMessage"></span>
</div>

<!-- Withdraw Modal -->
<div class="modal-overlay withdraw-modal" id="withdrawModal">

  </div>
</div>

<!-- Scripts -->
<script>
/* ── FIREBASE INITIALIZATION ── */
let firebaseInitialized = false;
let db, DC, TC, CC, EC, SC;

console.log('Checking Firebase availability...');
console.log('window.firebase:', typeof window.firebase);
if(typeof window.firebase === 'undefined'){
  console.error('ERROR: Firebase SDK not loaded!');
  alert('Firebase SDK 加载失败，请检查网络连接');
}

try {
  console.log('Initializing Firebase...');
  console.log('API Key:', window._0x1);
  console.log('Project ID:', window._0x3);
  
  if(!firebase.apps.length){
    firebase.initializeApp({
      apiKey:window._0x1,
      authDomain:window._0x2,
      projectId:window._0x3,
      storageBucket:window._0x4,
      messagingSenderId:window._0x5,
      appId:window._0x6
    });
  }
  
  db = firebase.firestore();
  console.log('Firestore instance created:', db);
  
  // 优化Firebase配置：启用持久性但移除experimental long polling
  db.settings({ persistence: true });
  DC = db.collection('users');
  TC = db.collection('tasks');
  CC = db.collection('completions');
  EC = db.collection('earnStats');
  SC = db.collection('spendStats');
  RC = db.collection('bountyReplies');
  WC = db.collection('withdrawals');
  SYSC = db.collection('system'); // system 集合存储配置数据
  
  // 初始化 Twitter Auth Provider
  window.twitterProvider = new firebase.auth.TwitterAuthProvider();
  // 初始化 Google Auth Provider
  window.googleProvider = new firebase.auth.GoogleAuthProvider();
  console.log('Twitter Auth Provider initialized');
  
  // 初始化 Firebase Storage
  window.storage = firebase.storage();
  console.log('Firebase Storage initialized');

  // 设置 Auth 持久化登录状态
  firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL).then(() => {
    console.log('Firebase Auth persistence set to LOCAL');
  }).catch((error) => {
    console.error('Failed to set Auth persistence:', error);
  });

  // 监听 Auth 状态变化，自动恢复登录
  firebase.auth().onAuthStateChanged(async (firebaseUser) => {
    if (firebaseUser && !currentUser) {
      console.log('Auth state changed: User logged in, restoring session...', firebaseUser.uid);
      try {
        // 优化1：先从本地缓存读取用户数据，快速显示
        let user = null;
        const cachedUserStr = localStorage.getItem('cachedUser');
        if (cachedUserStr) {
          try {
            user = JSON.parse(cachedUserStr);
            // 补全缓存用户的数据
            user = ensureCompleteUserData(user, firebaseUser);
            console.log('Loaded and completed user from cache:', user.nick);
            setCurrentUser(user);
            renderUserArea();
            updateDashboard();
            showToast(t('Welcome back') + user.nick + '！', 'success');
          } catch (e) {
            console.log('Failed to parse cached user');
          }
        }
        
        // 优化2：同时从Firebase获取最新数据，更新缓存
        const freshUser = await DB.getUser(firebaseUser.uid);
        if (freshUser) {
          // 补全从Firebase获取的用户数据
          const completeUser = ensureCompleteUserData(freshUser, firebaseUser);
          await DB.saveUser(completeUser);
          setCurrentUser(completeUser);
          localStorage.setItem('cachedUser', JSON.stringify(completeUser));
          // 如果有缓存数据，这里静默更新
          if (!user) {
            renderUserArea();
            updateDashboard();
            showToast(t('Welcome back') + completeUser.nick + '！', 'success');
          }
        } else if (user) {
          // 如果Firebase没有数据但有缓存，把缓存数据保存到Firebase
          await DB.saveUser(user);
        }
        
        // 延迟加载任务
        setTimeout(()=>loadTasks(), 200);
      } catch (error) {
        console.error('Failed to restore user session:', error);
      }
    }
  });

  firebaseInitialized = true;
  console.log('Firebase initialized successfully!');
  console.log('Collections:', { DC, TC, CC, EC, SC });
} catch (error) {
  console.error('Firebase initialization failed:', error);
  console.error('Firebase error code:', error.code);
  alert('数据库连接失败，请检查网络连接后重试: ' + error.message);
}

/* ── DATA LAYER (Firebase Firestore) ── */
const DB={
  async getWelcomeBonusStats(){
    if(!firebaseInitialized)return { totalClaimed: 0 };
    try {
      const snap=await SYSC.doc('welcomeBonus').get();
      if(snap.exists){
        return snap.data();
      } else {
        // 初始化数据
        const initData={ totalClaimed:0, totalNiao:10000000000000, createdAt:Date.now() };
        await SYSC.doc('welcomeBonus').set(initData);
        return initData;
      }
    } catch (error) {
      console.error('getWelcomeBonusStats error:', error);
      return { totalClaimed: 0 };
    }
  },
  async updateWelcomeBonusStats(increment){
    if(!firebaseInitialized)return;
    try {
      await SYSC.doc('welcomeBonus').update({
        totalClaimed: firebase.firestore.FieldValue.increment(increment),
        updatedAt: Date.now()
      });
    } catch (error) {
      console.error('updateWelcomeBonusStats error:', error);
    }
  },
  async resetWelcomeBonusStats(){
    if(!firebaseInitialized)return;
    try {
      await SYSC.doc('welcomeBonus').set({
        totalClaimed: 0,
        totalNiao: 10000000000000,
        resetAt: Date.now()
      }, {merge: true});
      console.log('欢迎奖励统计已重置');
    } catch (error) {
      console.error('resetWelcomeBonusStats error:', error);
    }
  },
  async getUser(wallet){
    if(!wallet)return null;
    if(!firebaseInitialized)return null;
    try {
      const snap=await DC.doc(wallet).get();
      return snap.exists?snap.data():null;
    } catch (error) {
      console.error('getUser error:', error);
      return null;
    }
  },
  async saveUser(user){
    if(!user){
      console.error('saveUser: invalid user data');
      return;
    }
    const docId = user.wallet || user.id;
    if(!docId){
      console.error('saveUser: no wallet or id found');
      return;
    }
    if(!firebaseInitialized){
      console.error('saveUser: firebase not initialized');
      return;
    }
    try {
      console.log('saveUser: attempting to save user:', docId);
      await DC.doc(docId).set(user,{merge:true});
      console.log('saveUser: success');
    } catch (error) {
      console.error('saveUser error:', error.message || error);
      console.error('saveUser error code:', error.code);
    }
  },
  async getUserByEmail(email){
    if(!email)return null;
    if(!firebaseInitialized)return null;
    try {
      const snap=await DC.where('email', '==', email).get();
      if(snap.empty)return null;
      const user=snap.docs[0].data();
      user.id=snap.docs[0].id;
      return user;
    } catch (error) {
      console.error('getUserByEmail error:', error);
      return null;
    }
  },
  async saveUserByEmail(email, user){
    if(!email||!user){
      console.error('saveUserByEmail: invalid data');
      return;
    }
    if(!firebaseInitialized){
      console.error('saveUserByEmail: firebase not initialized');
      return;
    }
    try {
      console.log('saveUserByEmail: attempting to save user:', email);
      console.log('saveUserByEmail: user data:', JSON.stringify(user, null, 2));
      const docRef = await DC.add(user);
      console.log('saveUserByEmail: success, docId:', docRef.id);
      return docRef.id;
    } catch (error) {
      console.error('saveUserByEmail error:', error.message || error);
      console.error('saveUserByEmail error code:', error.code);
      throw error;
    }
  },
  async updateUserBalance(wallet,balance){
    if(!wallet)return;
    if(!firebaseInitialized)return;
    try {
      await DC.doc(wallet).update({balance,updatedAt:Date.now()});
    } catch (error) {
      console.error('updateUserBalance error:', error);
    }
  },
  async updateUserPending(wallet,pending){
    if(!wallet)return;
    if(!firebaseInitialized)return;
    try {
      await DC.doc(wallet).update({pending,updatedAt:Date.now()});
    } catch (error) {
      console.error('updateUserPending error:', error);
    }
  },
  async getTasks(){
    if(!firebaseInitialized)return[];
    try {
      const snap=await TC.orderBy('createdAt','desc').get();
      return snap.docs.map(d=>({id:d.id,...d.data()}));
    } catch (error) {
      console.error('getTasks error:', error);
      return[];
    }
  },
  async saveTask(task){
    if(!task)return;
    if(!firebaseInitialized)return;
    try {
      if(task.id){
        await TC.doc(task.id).set(task,{merge:true});
      }else{
        const ref=TC.doc();
        task.id=ref.id;
        await ref.set(task);
      }
    } catch (error) {
      console.error('saveTask error:', error);
    }
  },
  async updateTaskAccepted(taskId,accepted){
    if(!firebaseInitialized)return;
    try {
      await TC.doc(taskId).update({accepted,updatedAt:Date.now()});
    } catch (error) {
      console.error('updateTaskAccepted error:', error);
    }
  },
  async getCompletions(wallet){
    if(!wallet)return{};
    if(!firebaseInitialized)return{};
    try {
      const snap=await CC.doc(wallet).get();
      return snap.exists?snap.data():{};
    } catch (error) {
      console.error('getCompletions error:', error);
      return{};
    }
  },
  async saveCompletion(wallet,taskId,data){
    if(!wallet||!taskId)return;
    if(!firebaseInitialized)return;
    try {
      await CC.doc(wallet).set({[taskId]:data},{merge:true});
    } catch (error) {
      console.error('saveCompletion error:', error);
    }
  },
  async getEarnStats(){
    if(!firebaseInitialized)return{};
    try {
      const snap=await EC.get();
      const stats={};
      snap.docs.forEach(d=>{stats[d.id]=d.data();});
      return stats;
    } catch (error) {
      console.error('getEarnStats error:', error);
      return{};
    }
  },
  async recordEarn(wallet,amount,userInfo){
    if(!wallet)return;
    if(!firebaseInitialized)return;
    try {
      const ref=EC.doc(wallet);
      const doc=await ref.get();
      const data={amount:(doc.data()?.amount||0)+amount,avatar:userInfo.avatar,nick:userInfo.nick,wallet};
      await ref.set(data,{merge:true});
    } catch (error) {
      console.error('recordEarn error:', error);
    }
  },
  async getSpendStats(){
    if(!firebaseInitialized)return{};
    try {
      const snap=await SC.get();
      const stats={};
      snap.docs.forEach(d=>{stats[d.id]=d.data();});
      return stats;
    } catch (error) {
      console.error('getSpendStats error:', error);
      return{};
    }
  },
  async recordSpend(wallet,amount,userInfo){
    if(!wallet)return;
    if(!firebaseInitialized)return;
    try {
      const ref=SC.doc(wallet);
      const doc=await ref.get();
      const data={amount:(doc.data()?.amount||0)+amount,avatar:userInfo.avatar,nick:userInfo.nick,wallet};
      await ref.set(data,{merge:true});
    } catch (error) {
      console.error('recordSpend error:', error);
    }

  async getLeaderboard(type){
    if(!firebaseInitialized)return[];
    try {
      const col=type==='earn'?EC:SC;
      const snap=await col.orderBy('amount','desc').limit(50).get();
      return snap.docs.map(d=>({id:d.id,...d.data()}));
    } catch (error) {
      console.error('getLeaderboard error:', error);
      return[];
    }

  async rechargeRecord(wallet,amount,txHash){
    if(!wallet)return;
    if(!firebaseInitialized)return;
    try {
      await DC.doc(wallet).collection('recharges').add({
        amount,txHash,status:'completed',createdAt:Date.now()
      });
    } catch (error) {
      console.error('rechargeRecord error:', error);
    }
  },
  subscribeToUser(wallet,callback){
    if(!wallet)return()=>{};
    if(!firebaseInitialized)return()=>{};
    try {
      return DC.doc(wallet).onSnapshot(doc=>{
        if(doc.exists)callback(doc.data());
      });
    } catch (error) {
      console.error('subscribeToUser error:', error);
      return()=>{};
    }
  },
  subscribeToTasks(callback){
    if(!firebaseInitialized)return()=>{};
    try {
      return TC.orderBy('createdAt','desc').onSnapshot(snap=>{
        const tasks=snap.docs.map(d=>({id:d.id,...d.data()}));
        callback(tasks);
      });
    } catch (error) {
      console.error('subscribeToTasks error:', error);
      return()=>{};
    }
  },
  subscribeToLeaderboard(type,callback){
    if(!firebaseInitialized)return()=>{};
    try {
      const col=type==='earn'?EC:SC;
      return col.orderBy('amount','desc').limit(50).onSnapshot(snap=>{
        const data=snap.docs.map(d=>({id:d.id,...d.data()}));
        callback(data);
      });
    } catch (error) {
      console.error('subscribeToLeaderboard error:', error);
      return()=>{};
    }
  },
  async saveBountyReply(taskId, replyText, author){
    if(!firebaseInitialized)return;
    if(!taskId || !replyText || !author)return;
    try {
      await RC.add({
        taskId,
        text: replyText,
        authorWallet: author.wallet,
        authorNick: author.nick,
        authorAvatar: author.avatar,
        createdAt: Date.now()
      });
      console.log('Bounty reply saved:', { taskId, authorWallet: author.wallet });
    } catch (error) {
      console.error('saveBountyReply error:', error);
    }
  },
  async getBountyReplies(taskId){
    if(!firebaseInitialized)return[];
    if(!taskId)return[];
    try {
      const snap = await RC.where('taskId', '==', taskId).orderBy('createdAt', 'asc').get();
      return snap.docs.map(d => ({id: d.id, ...d.data()}));
    } catch (error) {
      console.error('getBountyReplies error:', error);
      return[];
    }
  },
  async saveWithdraw(wallet, amount, address, userInfo){
    if(!firebaseInitialized)return;
    if(!wallet || !amount || !address)return;
    try {
      await WC.add({
        wallet,
        amount,
        address,
        userNick: userInfo.nick,
        userAvatar: userInfo.avatar,
        status: 'pending',
        createdAt: Date.now()
      });
      console.log('Withdraw record saved:', { wallet, amount, address });
    } catch (error) {
      console.error('saveWithdraw error:', error);
    }
  },
  async getWithdrawals(wallet){
    if(!firebaseInitialized)return[];
    if(!wallet)return[];
    try {
      const snap = await WC.where('wallet', '==', wallet).orderBy('createdAt', 'desc').get();
      return snap.docs.map(d => ({id: d.id, ...d.data()}));
    } catch (error) {
      console.error('getWithdrawals error:', error);
      return[];
    }
  }
}

// 辅助函数：补全用户数据字段
function ensureCompleteUserData(user, firebaseUser) {
  if (!user) user = {};
  user.id = firebaseUser?.uid || user.id;
  user.wallet = firebaseUser?.uid || user.wallet;
  user.email = user.email || firebaseUser?.email;
  user.nick = user.nick || firebaseUser?.displayName || (user.email ? user.email.split('@')[0] : 'User');
  user.avatar = user.avatar || firebaseUser?.photoURL || 'https://api.dicebear.com/7.x/bottts/svg?seed=' + user.id;
  user.balance = typeof user.balance === 'number' ? user.balance : 0;
  user.pending = typeof user.pending === 'number' ? user.pending : 0;
  user.xAccount = user.xAccount || '';
  user.withdrawableBalance = typeof user.withdrawableBalance === 'number' ? user.withdrawableBalance : 0;
  user.nonWithdrawableBalance = typeof user.nonWithdrawableBalance === 'number' ? user.nonWithdrawableBalance : 0;
  user.hasClaimedWelcomeBonus = typeof user.hasClaimedWelcomeBonus === 'boolean' ? user.hasClaimedWelcomeBonus : false;
  return user;
}

function t(text){
  return i18n[lang] && i18n[lang][text] ? i18n[lang][text] : text;
}

async function initApp(){
  await loadTasks();
  renderTasks();
  renderLeaderboard();
  initTabs();
  initBg();
  updateStaticTexts();
}

async function loadTasks(){
  // 优化1：先尝试从缓存读取
  try {
    const cachedTasksStr = localStorage.getItem('cachedTasks');
    if (cachedTasksStr) {
      const cachedTasks = JSON.parse(cachedTasksStr);
      if (cachedTasks.length > 0) {
        allTasks = cachedTasks;
        renderTasks(); // 快速显示缓存的任务
      }
    }
  } catch (e) {
    console.log('Failed to load cached tasks');
  }
  
  // 优化2：同时从Firebase获取最新任务
  const freshTasks = await DB.getTasks();
  if (freshTasks && freshTasks.length > 0) {
    allTasks = freshTasks;
    renderTasks();
    // 保存到缓存（缓存有效期10分钟）
    localStorage.setItem('cachedTasks', JSON.stringify(freshTasks));
    localStorage.setItem('cachedTasksTime', Date.now().toString());
  }
}

document.addEventListener('DOMContentLoaded',async()=>{
  renderUserArea();
  await initApp();
  updateDashboard();
  updatePublishFormVis();

  const urlParams = new URLSearchParams(window.location.search);
  const xBound = urlParams.get('x_bound');
  const xUsername = urlParams.get('username');

  if (xBound === '1' && xUsername) {
    if (currentUser) {
      currentUser.xAccount = decodeURIComponent(xUsername);
      await DB.saveUser(currentUser);
      renderUserArea();
      updateDashboard();
      showToast(`✅ X 账号 @${decodeURIComponent(xUsername)} 绑定成功！`, 'success');
    }
    window.history.replaceState({}, '', window.location.pathname);
  }

  window.addEventListener('message', async (event) => {
    if (event.data && event.data.type === 'X_BIND_SUCCESS') {
      if (currentUser && event.data.username) {
        currentUser.xAccount = event.data.username;
        await DB.saveUser(currentUser);
        renderUserArea();
        updateDashboard();
      }
    }
  });
});

async function doGoogleSignIn(){
  console.log('Starting Google sign in...');
  try {
    const auth = firebase.auth();
    const userCredential = await auth.signInWithPopup(window.googleProvider);
    const firebaseUser = userCredential.user;
    
    console.log('Google sign in successful, uid:', firebaseUser.uid);
    
    // 获取用户数据
    let user = await DB.getUser(firebaseUser.uid);
    let userData;
    
    if(!user){
      console.log('Creating new user document...');
      userData = ensureCompleteUserData({}, firebaseUser);
      userData.createdAt = Date.now();
      await DB.saveUser(userData);
      setCurrentUser(userData);
    } else {
      console.log('Existing user, ensuring complete data...');

      userData = ensureCompleteUserData(user, firebaseUser);
      await DB.saveUser(userData);
      setCurrentUser(userData);

function consumeBalance(amount) {
  // 确保字段存在
  currentUser.balance = currentUser.balance || 0;
  currentUser.nonWithdrawableBalance = currentUser.nonWithdrawableBalance || 0;
  currentUser.withdrawableBalance = currentUser.withdrawableBalance || 0;
  
  let remaining = amount;
  
  // 先消耗不可提现余额
  if (currentUser.nonWithdrawableBalance > 0 && remaining > 0) {
    const consumeFromNonWithdrawable = Math.min(currentUser.nonWithdrawableBalance, remaining);
    currentUser.nonWithdrawableBalance -= consumeFromNonWithdrawable;
    remaining -= consumeFromNonWithdrawable;
  }
  
  // 剩余部分从可提现余额中扣除
  if (remaining > 0) {
    if (currentUser.withdrawableBalance >= remaining) {
      currentUser.withdrawableBalance -= remaining;
      remaining = 0;
    } else {
      // 可提现余额不足
      return false;
    }
  }
  
  // 更新总余额
  currentUser.balance = currentUser.nonWithdrawableBalance + currentUser.withdrawableBalance;
  return true;
}

function formatNiaoAmount(amount) {
  if(amount >= 1000000000000) {
    return (amount / 1000000000000).toFixed(3) + t('trillion') + t('unit');
  } else if(amount >= 100000000) {
    return (amount / 100000000).toFixed(3) + t('hundred million') + t('unit');
  } else if(amount >= 10000) {
    return (amount / 10000).toFixed(3) + t('ten thousand') + t('unit');
  } else {
    return amount.toLocaleString() + t('unit');
  }
}

async function loadBountyReplies(taskId){
  const repliesList = document.getElementById('bountyRepliesList');
  if(!repliesList)return;
  try {
    const replies = await DB.getBountyReplies(taskId);
    if(!replies.length){
      repliesList.innerHTML = '<div style="color:var(--text-dim);font-size:.82rem">'+t('No replies yet, be the first!')+'</div>';
      return;
    }
    repliesList.innerHTML = replies.map(r => `
      <div style="display:flex;gap:.6rem;padding:.6rem 0;border-bottom:1px solid var(--card-border)">
        <img src="${r.authorAvatar}" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--card-border);flex-shrink:0">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.2rem">
            <span style="font-weight:700;font-size:.82rem">${esc(r.authorNick)}</span>
            <span style="font-size:.72rem;color:var(--text-dim)">${getTimeAgo(r.createdAt)}</span>
          </div>
          <div style="font-size:.85rem;color:var(--text)">${esc(r.text)}</div>
        </div>
      </div>
    `).join('');
  } catch (error) {
    console.error('Failed to load bounty replies:', error);
    repliesList.innerHTML = '<div style="color:var(--red);font-size:.82rem">'+t('Failed to load replies')+'</div>';
  }
}

async function claimWelcomeBonus(event) {
  event.stopPropagation();
  if(!currentUser) {
    showToast('请先登录', 'error');
    return;
  }
  
  if(currentUser.hasClaimedWelcomeBonus) {
    showToast('您已领取过欢迎奖励', 'error');
    return;
  }
  
  // 检查是否已全部领完
  try {
    const stats=await DB.getWelcomeBonusStats();
    console.log('当前奖励统计:', stats);
    const claimedNiao=(stats.totalClaimed||0)*1000000000;
    console.log('已领取总NIAO:', claimedNiao);
    if(claimedNiao>=10000000000000){
      showToast('奖励已全部领完', 'error');
      closeModal('taskDetailModal');
      renderTasks();
      return;
    }
  }catch(e){console.error(e);}
  
  try {

    currentUser.nonWithdrawableBalance = (currentUser.nonWithdrawableBalance || 0) + bonusAmount;
    currentUser.balance = (currentUser.balance || 0) + bonusAmount;

/* ── TASK ACTIONS ── */
async function doTaskAction(e,taskId,action,url){
  e.stopPropagation();
  if(!currentUser){showToast(t('Please login first'), 'error');return}
  if(!currentUser.xAccount){showToast(t('Please bind X account first to participate in social tasks'), 'error');openModal('bindXModal');return}
  const t=allTasks.find(x=>x.id===taskId);if(!t)return;
  if(t.publisher.wallet===currentUser.wallet){showToast(t('Cannot complete your own task'), 'error');return}
  if(t.accepted>=t.participants){showToast(t('Task is full'), 'error');return}
  const comps=await DB.getCompletions(currentUser.wallet),key=taskId;
  if(!comps[key])comps[key]={};
  if(comps[key][action]){showToast(t('You have already completed this'), 'error');openTaskDetail(taskId);return}

  let target=url;
  if(action==='like'){const m=url.match(/status\/(\d+)/);if(m)target='https://x.com/intent/like?tweet_id='+m[1]}
  else if(action==='retweet'){const m=url.match(/status\/(\d+)/);if(m)target='https://x.com/intent/retweet?tweet_id='+m[1]}
  else if(action==='comment'){target=url}
  else if(action==='follow'){target=url}

  if(target)window.open(target,'_blank');

  const msgs={like:'你是否已经点赞了该推文？',comment:'你是否已经评论了该推文？',retweet:'你是否已经转发了该推文？',follow:'你是否已经关注了该 X 账号？'};
  setTimeout(async ()=>{
    if(confirm(msgs[action]||'是否已完成？')){
      comps[key][action]=true;
      await DB.saveCompletion(currentUser.wallet,key,comps[key]);
      const allDone=t.actions.every(a=>comps[key][a]);
      if(allDone&&!comps[key]._rw){
        comps[key]._rw=true;
        await DB.saveCompletion(currentUser.wallet,key,comps[key]);
        // 将奖励加到不可提现余额
        currentUser.nonWithdrawableBalance = (currentUser.nonWithdrawableBalance || 0) + t.niaoPerPerson;
        currentUser.balance = (currentUser.balance || 0) + t.niaoPerPerson;
        await DB.saveUser(currentUser);
        await DB.recordEarn(currentUser.wallet, t.niaoPerPerson, currentUser);
        await DB.updateTaskAccepted(taskId,Math.min(t.accepted+1,t.participants));
        await loadTasks();
        renderUserArea();
        updateDashboard();
        showToast(t('Congratulations! You got') + ' ' + formatNiaoAmount(t.niaoPerPerson), 'success');
      }
      openTaskDetail(taskId);
    }
  },500);
}

async function submitBounty(taskId){
  const ta=document.getElementById('bountySubmissionText');if(!ta)return;
  const txt=ta.value.trim(),t=allTasks.find(x=>x.id===taskId);if(!t)return;
  if(t.bountyMinWords&&txt.length<t.bountyMinWords){showToast(t('Insufficient words') + ' ' + t.bountyMinWords + ' ' + t('word(s)'), 'error');return}

  await DB.updateTaskAccepted(taskId,Math.min(t.accepted+1,t.participants));

  currentUser.nonWithdrawableBalance = (currentUser.nonWithdrawableBalance || 0) + t.niaoPerPerson;

  await DB.saveUser(currentUser);
  await DB.recordEarn(currentUser.wallet, t.niaoPerPerson, currentUser);
  await loadTasks();
  renderTasks();renderUserArea();updateDashboard();
  showToast('🎉 提交成功！获得 ' + formatNiaoAmount(t.niaoPerPerson), 'success');

async function connectWallet(type){
  let provider;
  let ethereumProvider;

  if(type === 'metamask'){
    if(!window.ethereum){
      alert('请安装 MetaMask 钱包插件！');return;
    }
    ethereumProvider = window.ethereum;
    provider = new ethers.BrowserProvider(window.ethereum);
  }else if(type === 'okx'){
    if(window.okxwallet){
      ethereumProvider = window.okxwallet;
      provider = new ethers.BrowserProvider(window.okxwallet);
    } else if(window.ethereum && window.ethereum.isOKXWallet){
      ethereumProvider = window.ethereum;
      provider = new ethers.BrowserProvider(window.ethereum);
    } else if(window.ethereum){
      ethereumProvider = window.ethereum;
      provider = new ethers.BrowserProvider(window.ethereum);
    } else {
      alert('请安装 OKX Wallet 钱包插件！');return;
    }
  }else if(type === 'trust'){
    if(window.trustwallet){
      ethereumProvider = window.trustwallet;
      provider = new ethers.BrowserProvider(window.trustwallet);
    } else if(window.ethereum && window.ethereum.isTrust){
      ethereumProvider = window.ethereum;
      provider = new ethers.BrowserProvider(window.ethereum);
    } else if(window.ethereum){
      ethereumProvider = window.ethereum;
      provider = new ethers.BrowserProvider(window.ethereum);
    } else {
      alert('请安装 Trust Wallet 钱包插件！');return;
    }
  }else{
    alert('不支持的钱包类型');return;
  }

  try {
    console.log('Step 1: Calling eth_requestAccounts...');
    const accounts = await ethereumProvider.request({ method: 'eth_requestAccounts' });
    console.log('Step 2: Got accounts:', accounts);
    
    const addr = accounts[0];
    console.log('Step 3: Address:', addr);
    
    if(!addr){
      showToast('钱包连接失败：未获取到地址', 'error');
      return;
    }

    const signer = await provider.getSigner();
    const network = await provider.getNetwork();
    const chainId = network.chainId.toString();
    console.log('Step 4: Network chainId:', chainId);

    if(chainId !== '56' && chainId !== '97'){
      try{
        console.log('Step 5: Switching to BSC network...');
        await ethereumProvider.request({
          method: 'wallet_switchEthereumChain',
          params: [{ chainId: '0x38' }]
        });
        console.log('Step 6: Network switched successfully');
      }catch(switchError){
        showToast('请切换到 BSC 网络 (Chain ID: 56)', 'error');
        return;
      }
    }

    console.log('Step 7: Getting user from DB...');
    let existingUser = null;
    let dbConnected = true;
    
    try {
      const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('DB timeout')), 10000));
      existingUser = await Promise.race([DB.getUser(addr), timeoutPromise]);
      console.log('Step 8: Existing user:', existingUser);
    } catch (dbError) {
      console.error('DB connection failed:', dbError);
      dbConnected = false;
      showToast('数据库连接超时，将使用本地数据', 'warning');
    }
    
    const INITIAL_BONUS = 1000000000;
    setCurrentUser({
      wallet: addr,
      nick: existingUser?.nick || addr.slice(0,6)+'...'+addr.slice(-4),
      avatar: existingUser?.avatar || 'https://api.dicebear.com/7.x/bottts/svg?seed='+addr.slice(2,8),
      balance: existingUser?.balance ?? INITIAL_BONUS,
      pending: existingUser?.pending || 0,
      xAccount: existingUser?.xAccount || '',
      walletType: type,
      nonWithdrawableBalance: existingUser?.nonWithdrawableBalance ?? INITIAL_BONUS
    });
    
    if(dbConnected) {
      try {
        await DB.saveUser(currentUser);
        
        if(unsubUser)unsubUser();
        unsubUser=DB.subscribeToUser(addr,user=>{
          setCurrentUser(user);
          renderUserArea();
          updateDashboard();
        });
        
        unsubTasks=DB.subscribeToTasks(tasks=>{
          allTasks=tasks;
          renderTasks();
        });
      } catch (saveError) {
        console.error('Failed to save user:', saveError);
        dbConnected = false;
      }
    }
    
    closeModal('loginModal');
    console.log('Closing modal, currentUser:', currentUser);
    renderUserArea();
    console.log('After renderUserArea, userArea innerHTML:', document.getElementById('userArea').innerHTML.substring(0, 100));
    updateDashboard();
    loadTasks();
    showToast('钱包连接成功！地址: ' + addr.substring(0,10) + '...' + addr.substring(32), 'success');
  } catch (err) {
    console.error('钱包连接失败:', err);
    if(err.code === 4001 || err.code === 'ACTION_REJECTED'){
      showToast('用户拒绝了连接请求', 'error');
    } else if(err.message?.includes('User rejected')){
      showToast('用户拒绝了连接请求', 'error');
    } else {
      showToast('钱包连接失败: ' + (err.message?.substring(0,80) || '未知错误'), 'error');
    }
  }
}
function doLogout(){
  if(unsubUser)unsubUser();
  if(unsubTasks)unsubTasks();
  if(unsubLb)unsubLb();
  unsubUser=null;unsubTasks=null;unsubLb=null;
  setCurrentUser(null);
  
  // 完全清除所有缓存和Firebase认证状态
  localStorage.clear();
  sessionStorage.clear();
  
  // 退出Firebase登录
  const auth = firebase.auth();
  auth.signOut().catch(error => {
    console.error('Firebase sign out error:', error);
  });
  
  toggleProfile();
  renderUserArea();
  updateDashboard();
  document.getElementById('fabMenu').classList.remove('show');
  showToast('已退出登录，数据已清理', 'info');
}

function editAvatar(){
  if(!currentUser)return;
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = async function(e){
    const file = e.target.files[0];
    if(!file){
      showToast('请选择图片', 'error');
      return;
    }
    
    // 限制文件大小（2MB）
    if(file.size > 2 * 1024 * 1024){
      showToast('图片大小不能超过2MB', 'error');
      return;
    }
    
    console.log('Uploading avatar:', file.name, file.size);
    
    try {
      // 使用 Firebase Storage 存储头像
      const storageRef = window.storage.ref();
      const avatarRef = storageRef.child('avatars/' + currentUser.id + '/' + Date.now() + '_' + file.name);
      
      // 上传文件
      const snapshot = await avatarRef.put(file);
      console.log('Avatar uploaded, bytes transferred:', snapshot.bytesTransferred);
      
      // 获取下载URL
      const downloadURL = await snapshot.ref.getDownloadURL();
      console.log('Avatar download URL:', downloadURL);
      
      // 更新用户头像
      currentUser.avatar = downloadURL;
      await DB.saveUser(currentUser);
      
      console.log('Avatar saved to database');
      
      // 强制刷新头像
      renderUserArea();
      updateDashboard();
      
      // 强制刷新头像图片（清除缓存）
      const dashAvatar = document.getElementById('dashAvatar');
      if(dashAvatar){
        dashAvatar.src = downloadURL + '?' + Date.now();
      }
      
      const navAvatar = document.querySelector('.user-avatar-btn img');
      if(navAvatar){
        navAvatar.src = downloadURL + '?' + Date.now();
      }
      
      showToast('头像修改成功！', 'success');
    } catch (error) {
      console.error('Failed to upload avatar:', error);
      showToast('头像上传失败：' + error.message, 'error');
    }
  };
  input.click();
}
async function doBindX(){
  if(!currentUser){
    showToast('请先登录后再绑定 X 账号', 'error');
    return;
  }

  try {
    localStorage.setItem('x_bind_return_url', window.location.href);
    showToast('正在连接 X 授权服务...', 'info');

    const apiBase = window.location.protocol + '//' + window.location.host;
    const response = await fetch(apiBase + '/api/auth/twitter', {
      method: 'GET',
      credentials: 'include'
    });

    if (!response.ok) {
      throw new Error('Failed to get Twitter auth URL');
    }

    const { redirectUrl } = await response.json();
    console.log('Got Twitter auth URL:', redirectUrl);

    const width = 600;
    const height = 700;
    const left = window.screenX + (window.outerWidth - width) / 2;
    const top = window.screenY + (window.outerHeight - height) / 2;

    const popupWindow = window.open(
      redirectUrl,
      'Twitter OAuth',
      `width=${width},height=${height},left=${left},top=${top},popup=yes`
    );

    if (!popupWindow) {
      showToast('请允许弹出窗口以完成 X 授权', 'error');
      return;
    }

    showToast('请在弹出窗口中完成 X 授权...', 'info');

    let pollTimer;
    let messageHandler;

    const handleSuccess = async (username) => {
      clearInterval(pollTimer);
      window.removeEventListener('message', messageHandler);

      console.log('✅ X 账号绑定成功！', { username });
      currentUser.xAccount = username;
      await DB.saveUser(currentUser);

      if (!popupWindow.closed) {
        popupWindow.close();
      }

      renderUserArea();
      updateDashboard();
      closeModal('bindXModal');

      showToast(t('X account bound') + '@' + username + t('X bound success'), 'success');
    };

    messageHandler = async (event) => {
      if (event.data && event.data.type === 'X_BIND_SUCCESS') {
        await handleSuccess(event.data.username);
      }
    };
    window.addEventListener('message', messageHandler);

    pollTimer = setInterval(async () => {
      try {
        if (popupWindow.closed) {
          clearInterval(pollTimer);
          window.removeEventListener('message', messageHandler);
          showToast('授权已取消', 'info');
          return;
        }

        const currentUrl = popupWindow.location.href;
        if (currentUrl.includes('x_bound=1')) {
          const urlParams = new URL(currentUrl).searchParams;
          const twitterUsername = urlParams.get('username');
          if (twitterUsername) {
            await handleSuccess(decodeURIComponent(twitterUsername));
          }
        }
      } catch (e) {
        // Ignore cross-origin errors during polling
      }
    }, 500);

  } catch (error) {
    console.error('绑定失败:', error);
    showToast('绑定失败: ' + error.message, 'error');
  }
}

/* ── TOAST NOTIFICATION ── */
function showToast(message, type='info'){
  const toast=document.getElementById('toastNotification');
  const msg=document.getElementById('toastMessage');
  msg.textContent=message;
  if(type==='success'){
    toast.style.borderColor='var(--green)';
    msg.style.color='var(--green)';
  }else if(type==='error'){
    toast.style.borderColor='var(--red)';
    msg.style.color='var(--red)';
  }else{
    toast.style.borderColor='var(--card-border)';
    msg.style.color='var(--text)';
  }
  toast.style.display='block';
  setTimeout(()=>{toast.style.display='none'},3000);
}

document.addEventListener('click',e=>{if(e.target.classList.contains('recharge-amt')){document.querySelectorAll('.recharge-amt').forEach(a=>a.classList.remove('sel'));e.target.classList.add('sel')}});
const TOKEN_CONTRACT = '0xde6e12bdb2062dc48b409f0086219464a0c317a0';
const RECIPIENT_ADDRESS = '0x46da0914f6683bd70b46Ef0DE794788D71E21bC2';
const BSC_CHAIN_ID = 56;

async function switchToBSC(walletProvider) {
  try {
    await walletProvider.request({
      method: 'wallet_switchEthereumChain',
      params: [{ chainId: '0x' + BSC_CHAIN_ID.toString(16) }]
    });
    return true;
  } catch (switchError) {
    if (switchError.code === 4902) {
      try {
        await walletProvider.request({
          method: 'wallet_addEthereumChain',
          params: [{
            chainId: '0x' + BSC_CHAIN_ID.toString(16),
            chainName: 'Binance Smart Chain Mainnet',
            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
            rpcUrls: ['https://bsc-dataseed.binance.org/'],
            blockExplorerUrls: ['https://bscscan.com/']
          }]
        });
        return true;
      } catch (addError) {
        console.error('添加BSC网络失败:', addError);
        return false;
      }
    }
    console.error('切换网络失败:', switchError);
    return false;
  }
}

async function doRecharge() {
  if (!currentUser) {
    showToast(t('Please login'), 'error');
    return;
  }
  const amountInput = document.getElementById('rechargeAmount');
  const amount = parseInt(amountInput.value);
  if (!amount || amount <= 0) {
    showToast(t('Please enter valid amount'), 'error');
    return;
  }

  try {
    let walletProvider;
    if (currentUser.walletType === 'okx' && window.okxwallet) {
      walletProvider = window.okxwallet;
    } else if (currentUser.walletType === 'metamask' && window.ethereum) {
      walletProvider = window.ethereum;
    } else if (currentUser.walletType === 'trust' && window.trustwallet) {
      walletProvider = window.trustwallet;
    } else if (window.ethereum) {
      walletProvider = window.ethereum;
    } else if (window.okxwallet) {
      walletProvider = window.okxwallet;
    } else {
      showToast(t('No wallet detected'), 'error');
      return;
    }

    showToast(t('Detecting network...'), 'info');
    const switched = await switchToBSC(walletProvider);
    if (!switched) {
      showToast(t('Network switch failed'), 'error');
      return;
    }

    const provider = new ethers.BrowserProvider(walletProvider);
    const signer = await provider.getSigner();
    const userAddress = await signer.getAddress();

    const transferAmount = ethers.parseUnits(amount.toString(), 18);

    const recipientHex = RECIPIENT_ADDRESS.substring(2).padStart(64, '0');
    const amountHex = ethers.toBeHex(transferAmount).substring(2).padStart(64, '0');
    
    const txData = {
      from: userAddress,
      to: TOKEN_CONTRACT,
      data: '0xa9059cbb' + recipientHex + amountHex
    };

    showToast(t('Opening wallet...'), 'info');

    const txHash = await walletProvider.request({
      method: 'eth_sendTransaction',
      params: [txData]
    });

    // 交易提交后立即更新UI，不等待确认
    showToast(t('Transaction submitted'), 'info');
    
    // 立即更新本地余额（乐观更新）
    currentUser = ensureCompleteUserData(currentUser);
    currentUser.withdrawableBalance = (currentUser.withdrawableBalance || 0) + amount;
    currentUser.balance = (currentUser.balance || 0) + amount;
    await DB.saveUser(currentUser);
    
    // 立即关闭窗口并更新UI
    closeModal('rechargeModal');
    renderUserArea();
    updateDashboard();
    showToast(t('Recharge processing') + formatNiaoAmount(amount) + ' ' + t('Waiting blockchain confirm'), 'success');
    
    // 后台等待交易确认并保存记录
    provider.waitForTransaction(txHash, 1, 60000).then(async (receipt) => {
      if (receipt && receipt.status === 1) {
        console.log('交易成功确认，区块:', receipt.blockNumber);
        await DB.rechargeRecord(currentUser.wallet, amount, txHash);
        showToast(t('Recharge confirmed'), 'success');
      } else {
        console.error('交易确认失败');
      }
    }).catch(err => {
      console.error('等待交易确认时出错:', err);
    });
    
  } catch (error) {
    console.error('充值失败:', error);
    if (error.code === 4001 || error.message?.includes('User rejected') || error.message?.includes('rejected')) {
      showToast(t('Payment cancelled'), 'error');
    } else {
      showToast(t('Recharge failed') + (error.message?.substring(0, 80) || t('Unknown error')), 'error');
    }
  }
}
async function doWithdraw(){
  if(!currentUser)return;
  const addr=document.getElementById('withdrawAddr').value.trim(),amt=parseInt(document.getElementById('withdrawAmount').value)||0;
  if(!addr){
    showToast(t('Please enter withdraw address'), 'error');
    return;
  }
  if(amt<1){
    showToast(t('Please enter amount'), 'error');
    return;
  }
  const withdrawableBalance=(currentUser.withdrawableBalance||0);
  if(amt>withdrawableBalance){
    showToast(t('Insufficient withdraw balance') + formatNiaoAmount(withdrawableBalance) + t('Initial bonus cannot withdraw'), 'error');
    return;
  }
  
  try {
    await DB.saveWithdraw(currentUser.wallet, amt, addr, currentUser);
    console.log('提现记录已保存到数据库:', { address: addr, amount: amt });
  } catch (error) {
    console.error('保存提现记录失败:', error);
  }
  
  currentUser.withdrawableBalance=(currentUser.withdrawableBalance||0)-amt;
  currentUser.balance=(currentUser.balance||0)-amt;
  await DB.saveUser(currentUser);
  closeModal('withdrawModal');
  renderUserArea();
  updateDashboard();
  
  // 显示24小时到账的提示
  const modal = document.createElement('div');
  modal.className = 'custom-modal';
  modal.innerHTML = `

    <div class="custom-modal-content" style="max-width:400px;">
      <div class="custom-modal-header">
        <h3>${t('Withdrawal submitted')}</h3>
        <button class="custom-modal-close" onclick="closeCustomModal()">&times;</button>
      </div>
      <div class="custom-modal-body" style="text-align:center;padding:2rem 1rem;">
        <div style="font-size:3rem;margin-bottom:1rem;">&#9203;</div>
        <p style="font-size:1.1rem;line-height:1.6;">
          ${t('Withdrawal processing')}
        </p>
        <p style="font-size:0.9rem;color:var(--text-dim);margin-top:1rem;">
          ${lang==='zh'?'提现金额':'Withdrawal amount'}：<strong>${formatNiaoAmount(amt)}</strong>
        </p>
      </div>
      <div class="custom-modal-footer">
        <button class="custom-btn custom-btn-confirm" onclick="closeCustomModal()" style="width:100%;">
          ${lang==='zh'?'我知道了':'Got it'}
        </button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}
