<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#F5A623;--gold-light:#FFD700;--gold-dark:#B8860B;
  --bg:#08080C;--bg2:#0E0E14;--bg3:#14141E;
  --text:#E8E6E3;--text-dim:#7A7A8A;
  --card:#111118;--card-border:#1E1E2A;
  --red:#E74C3C;--green:#2ECC71;
}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;overflow-x:hidden}

.mobile-header{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(8,8,12,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--card-border);padding:.6rem 1rem;display:flex;align-items:center;justify-content:space-between}
.mobile-logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1.1rem;color:var(--gold);text-decoration:none}
.mobile-nav{display:flex;gap:.5rem}
.mobile-nav-btn{background:rgba(245,166,35,.1);border:1px solid var(--gold-dark);color:var(--gold);padding:.4rem .8rem;border-radius:8px;font-size:.75rem;font-weight:700;cursor:pointer;font-family:'Noto Sans SC',sans-serif}
.mobile-nav-btn.active{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000}
.mobile-user-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;cursor:pointer}

.mobile-main{margin-top:60px;padding:.8rem;padding-bottom:80px}

.tab-panel{display:none}
.tab-panel.active{display:block}

.task-grid{display:flex;flex-direction:column;gap:.8rem}
.task-card{background:var(--card);border:1px solid var(--card-border);border-radius:14px;padding:1rem;transition:all .3s;cursor:pointer}
.task-card:active{transform:scale(.98)}
.task-card:hover{border-color:var(--gold)}
.task-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem;gap:.5rem}
.task-title{font-weight:900;font-size:1rem;flex:1}
.task-reward{font-family:'Orbitron',monospace;font-size:.9rem;color:var(--gold);font-weight:700;white-space:nowrap}
.task-meta{display:flex;gap:.8rem;font-size:.75rem;color:var(--text-dim);margin-bottom:.5rem;flex-wrap:wrap}
.task-desc{font-size:.85rem;color:var(--text-dim);line-height:1.6;margin-bottom:.6rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.task-footer{display:flex;justify-content:space-between;align-items:center}
.task-publisher{display:flex;align-items:center;gap:.4rem;font-size:.75rem;color:var(--text-dim)}
.task-publisher img{width:20px;height:20px;border-radius:50%;border:1px solid var(--card-border)}
.accept-btn{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000;border:none;padding:.5rem 1rem;border-radius:8px;font-weight:800;font-size:.75rem;cursor:pointer;font-family:'Noto Sans SC',sans-serif}
.accept-btn:active{transform:scale(.95)}
.accept-btn:disabled{opacity:.5}

.bounty-special{background:linear-gradient(135deg,rgba(245,166,35,.08),rgba(155,89,182,.08));border-color:rgba(245,166,35,.3)}
.bounty-badge{display:inline-block;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000;font-size:.65rem;font-weight:900;padding:.2rem .6rem;border-radius:20px;margin-bottom:.5rem}

.task-status{font-size:.7rem;padding:.25rem .7rem;border-radius:20px;font-weight:700}
.status-open{background:rgba(46,204,113,.12);color:var(--green)}
.status-full{background:rgba(231,76,60,.12);color:var(--red)}

.lb-toggle{display:flex;gap:.4rem;margin-bottom:1rem}
.lb-toggle button{flex:1;background:var(--card);border:1px solid var(--card-border);color:var(--text-dim);padding:.6rem;border-radius:8px;font-weight:700;font-size:.8rem;cursor:pointer;font-family:'Noto Sans SC',sans-serif}
.lb-toggle button.active{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000;border-color:var(--gold)}
.lb-list{display:flex;flex-direction:column;gap:.5rem}
.lb-item{display:flex;align-items:center;gap:.8rem;padding:.8rem;background:var(--card);border:1px solid var(--card-border);border-radius:12px}
.lb-rank{font-family:'Orbitron',monospace;font-weight:900;font-size:1rem;color:var(--text-dim);width:28px;text-align:center}
.lb-item:nth-child(1) .lb-rank{color:#FFD700;font-size:1.2rem}
.lb-item:nth-child(2) .lb-rank{color:#C0C0C0}
.lb-item:nth-child(3) .lb-rank{color:#CD7F32}
.lb-avatar{width:36px;height:36px;border-radius:50%;border:2px solid var(--card-border);object-fit:cover}
.lb-nick{flex:1;font-weight:700;font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-amount{font-family:'Orbitron',monospace;font-weight:700;color:var(--gold);font-size:.85rem}

.dash-card{background:var(--card);border:1px solid var(--card-border);border-radius:14px;padding:1rem;margin-bottom:.8rem}
.dash-profile{display:flex;align-items:center;gap:.8rem;margin-bottom:1rem}
.dash-avatar{width:56px;height:56px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;cursor:pointer}
.dash-info{flex:1;min-width:0}
.dash-nick{font-weight:900;font-size:1rem;margin-bottom:.3rem;display:flex;align-items:center;gap:.3rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dash-x{display:flex;align-items:center;gap:.3rem;font-size:.75rem;color:var(--text-dim)}
.dash-x svg{width:14px;height:14px;fill:currentColor}
.dash-x-bind{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000;border:none;padding:.3rem .6rem;border-radius:6px;font-size:.7rem;font-weight:700;cursor:pointer;margin-left:auto;font-family:'Noto Sans SC',sans-serif;white-space:nowrap}
.dash-balance{text-align:center;padding:1rem 0}
.dash-balance-label{font-size:.75rem;color:var(--text-dim);margin-bottom:.3rem}
.dash-balance-value{font-family:'Orbitron',monospace;font-size:1.8rem;font-weight:900;color:var(--gold)}
.dash-balance-detail{display:flex;justify-content:center;gap:1rem;margin-top:.8rem;font-size:.8rem;flex-wrap:wrap}
.dash-balance-item{text-align:center}
.dash-balance-item .label{color:var(--text-dim);font-size:.7rem}
.dash-balance-item .val{font-family:'Orbitron',monospace;font-weight:700;color:var(--gold);font-size:.95rem}
.dash-actions{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:1rem}
.dash-action-btn{padding:.7rem;border-radius:10px;font-weight:700;font-size:.85rem;cursor:pointer;border:none;font-family:'Noto Sans SC',sans-serif}
.dash-topup-btn{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000}
.dash-withdraw-btn{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);color:var(--gold)}
.dash-pending{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.3);color:var(--green)}
.dash-edit{background:var(--bg3);border:1px solid var(--card-border);color:var(--text)}
.dash-logout{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);color:var(--red)}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,12,.95);backdrop-filter:blur(20px);border-top:1px solid var(--card-border);display:flex;padding:.5rem 0;z-index:1000}
.bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:.2rem;background:none;border:none;color:var(--text-dim);cursor:pointer;font-family:'Noto Sans SC',sans-serif;padding:.3rem}
.bottom-nav-item.active{color:var(--gold)}
.bottom-nav-item svg{width:22px;height:22px}
.bottom-nav-item span{font-size:.65rem;font-weight:700}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:2000;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal{background:var(--bg2);border:1px solid var(--card-border);border-radius:18px 18px 0 0;padding:1.5rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;position:relative}
.modal.center-modal{border-radius:18px;margin:0 1rem;max-width:400px;width:auto}
.modal h2{font-family:'Orbitron',monospace;font-size:1rem;color:var(--gold);margin-bottom:1rem;letter-spacing:1px}
.modal h3{font-size:.95rem;color:var(--gold);margin-bottom:.8rem;font-weight:900}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--text-dim);font-size:1.5rem;cursor:pointer;line-height:1;z-index:10}

.detail-title{font-weight:900;font-size:1.1rem;margin-bottom:.8rem}
.detail-desc{font-size:.9rem;color:var(--text-dim);line-height:1.7;margin-bottom:1rem;white-space:pre-wrap}
.detail-info{display:flex;flex-wrap:wrap;gap:.8rem;margin-bottom:1rem;font-size:.8rem;color:var(--text-dim)}
.detail-action-btn{display:flex;align-items:center;justify-content:center;gap:.4rem;padding:.8rem;border-radius:12px;font-weight:800;font-size:.9rem;cursor:pointer;transition:all .3s;border:none;font-family:'Noto Sans SC',sans-serif;width:100%;margin-bottom:.5rem}
.detail-action-btn.btn-follow{background:var(--green);color:#000}
.detail-action-btn.btn-like{background:var(--red);color:#fff}
.detail-action-btn.btn-retweet{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000}
.detail-action-btn.btn-comment{background:var(--bg3);color:var(--text);border:1px solid var(--card-border)}
.detail-action-btn:active{transform:scale(.98)}
.completion-status{padding:.6rem;border-radius:10px;font-size:.85rem;font-weight:700;text-align:center;margin-bottom:1rem}
.completion-done{background:rgba(46,204,113,.12);color:var(--green);border:1px solid rgba(46,204,113,.25)}
.completion-pending{background:rgba(245,166,35,.12);color:var(--gold);border:1px solid rgba(245,166,35,.25)}

.login-btn-mobile{width:100%;padding:.8rem;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000;border:none;border-radius:12px;font-weight:900;font-size:.95rem;cursor:pointer;font-family:'Noto Sans SC',sans-serif;margin-top:1rem}

.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.8rem;color:var(--text-dim);margin-bottom:.4rem;font-weight:700}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--card-border);border-radius:10px;padding:.8rem;color:var(--text);font-size:.9rem;font-family:'Noto Sans SC',sans-serif}
.form-input:focus{border-color:var(--gold);outline:none}
.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--card-border);border-radius:10px;padding:.8rem;color:var(--text);font-size:.9rem;font-family:'Noto Sans SC',sans-serif;min-height:100px;resize:vertical}

.checkbox-row{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem}
.task-type-check{background:var(--bg3);border:1px solid var(--card-border);border-radius:8px;padding:.5rem .8rem;font-size:.8rem;cursor:pointer;display:flex;align-items:center;gap:.3rem;font-weight:700}
.task-type-check.selected{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000;border-color:var(--gold)}
.task-type-check input{display:none}

.empty-state{text-align:center;padding:3rem 1rem;color:var(--text-dim)}
.empty-icon{font-size:2.5rem;margin-bottom:.8rem;opacity:.4}
.empty-state p{font-size:.9rem}

#toastNotification{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--card-border);border-radius:12px;padding:.7rem 1.2rem;color:var(--text);font-size:.85rem;box-shadow:0 8px 30px rgba(0,0,0,.4);z-index:9999;display:none;animation:fadeUp .3s ease;max-width:90%}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.reply-section{margin-top:1rem;padding-top:1rem;border-top:1px solid var(--card-border)}
.reply-item{display:flex;gap:.6rem;padding:.6rem 0;border-bottom:1px solid rgba(255,255,255,.05)}
.reply-item img{width:28px;height:28px;border-radius:50%;flex-shrink:0}
.reply-item .reply-content{flex:1;min-width:0}
.reply-item .reply-author{font-weight:700;font-size:.82rem}
.reply-item .reply-text{font-size:.85rem;color:var(--text);margin-top:.2rem;word-break:break-word}
.reply-input-wrap{display:flex;gap:.5rem;margin-top:.8rem}
.reply-input-wrap input{flex:1;background:var(--bg3);border:1px solid var(--card-border);border-radius:8px;padding:.6rem;color:var(--text);font-size:.85rem;font-family:'Noto Sans SC',sans-serif;min-width:0}
.reply-input-wrap button{background:var(--gold);color:#000;border:none;padding:.6rem 1rem;border-radius:8px;font-weight:700;font-size:.8rem;cursor:pointer;font-family:'Noto Sans SC',sans-serif;white-space:nowrap}

.fab-publish{position:fixed;bottom:70px;right:1rem;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000;border:none;font-size:1.4rem;font-weight:900;cursor:pointer;box-shadow:0 4px 20px rgba(245,166,35,.4);z-index:999;display:flex;align-items:center;justify-content:center}

.fab-menu{position:fixed;bottom:130px;right:1rem;display:none;flex-direction:column;gap:.5rem;z-index:999}
.fab-menu.show{display:flex}
.fab-menu button{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000;border:none;padding:.8rem 1rem;border-radius:10px;font-weight:800;font-size:.8rem;cursor:pointer;font-family:'Noto Sans SC',sans-serif;box-shadow:0 4px 20px rgba(245,166,35,.3);min-width:160px;text-align:left}

.wallet-connect-btn{display:flex;align-items:center;justify-content:center;gap:.8rem;width:100%;padding:.8rem;background:var(--bg3);border:1px solid var(--card-border);border-radius:12px;color:var(--text);font-size:.9rem;font-weight:700;cursor:pointer;font-family:'Noto Sans SC',sans-serif;margin-bottom:.6rem}
.wallet-connect-btn:active{transform:scale(.98);border-color:var(--gold)}

.loading{text-align:center;padding:2rem;color:var(--text-dim)}

.task-action-tags{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.5rem}
.task-action-tag{font-size:.65rem;padding:.15rem .5rem;border-radius:12px;font-weight:700}
.tag-follow{background:rgba(155,89,182,.12);color:#9B59B6}
.tag-like{background:rgba(231,76,60,.12);color:#E74C3C}
.tag-retweet{background:rgba(46,204,113,.12);color:#2ECC71}

.balance-highlight{color:var(--gold);font-weight:900}

.publish-options{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:1rem}
.publish-option-btn{padding:1rem;background:var(--bg3);border:1px solid var(--card-border);border-radius:12px;color:var(--text);font-size:.85rem;font-weight:700;cursor:pointer;font-family:'Noto Sans SC',sans-serif;text-align:center}
.publish-option-btn:active{border-color:var(--gold);background:rgba(245,166,35,.1)}
.publish-option-icon{font-size:1.5rem;margin-bottom:.3rem}
</style>
</head>
<body>

<header class="mobile-header">
  <a href="index.html" class="mobile-logo">NIAO</a>
  <div class="mobile-nav">
    <button class="mobile-nav-btn active" data-tab="tasks">任务</button>
    <button class="mobile-nav-btn" data-tab="leaderboard">排行</button>
  </div>
  <img class="mobile-user-btn" id="mobileUserBtn" src="https://api.dicebear.com/7.x/bottts/svg?seed=default" alt="" onclick="handleUserBtnClick()">
</header>

<main class="mobile-main">
  <div class="tab-panel active" id="panel-tasks">
    <div class="task-grid" id="taskGrid"></div>
    <div class="empty-state" id="emptyTasks" style="display:none">
      <div class="empty-icon">&#128270;</div>
      <p>暂无悬赏任务，登录后可发布任务</p>
    </div>
  </div>

  <div class="tab-panel" id="panel-leaderboard">
    <div class="lb-toggle">
      <button class="active" data-lb="earn">赚NIAO</button>
      <button data-lb="spend">撒NIAO</button>
    </div>
    <div class="lb-list" id="lbList"></div>
  </div>
</main>

<nav class="bottom-nav">
  <button class="bottom-nav-item active" data-tab="tasks">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6"/><path d="M9 16h6"/></svg>
    <span>任务</span>
  </button>
  <button class="bottom-nav-item" data-tab="leaderboard">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/></svg>
    <span>排行</span>

  <button class="bottom-nav-item" onclick="handleMobileDashboardClick()">

<button class="fab-publish" id="fabPublish" onclick="toggleFab()">+</button>
<div class="fab-menu" id="fabMenu">
  <button onclick="openPublishSocial()">📢 发布社交任务</button>
  <button onclick="openPublishBounty()">🎁 发布特殊悬赏</button>
</div>

<div class="modal-overlay task-detail-modal" id="taskDetailModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('taskDetailModal')">&times;</button>
    <div id="taskDetailContent"></div>
  </div>
</div>

<div class="modal-overlay" id="bountySubmitModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('bountySubmitModal')">&times;</button>
    <h3>提交悬赏任务</h3>
    <div class="form-group">
      <label>任务ID</label>
      <input type="text" id="bountyTaskIdDisplay" class="form-input" readonly>
    </div>
    <div class="form-group">
      <label>提交内容 <span id="bountyCharCount">0/200</span></label>
      <textarea id="bountySubmissionText" class="form-textarea" maxlength="200" placeholder="请输入你的提交内容..." oninput="updateCharCount()"></textarea>
    </div>
    <button class="detail-action-btn btn-follow" onclick="submitBountyFromMobile()">提交任务</button>
  </div>
</div>

<div class="modal-overlay" id="dashboardModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('dashboardModal')">&times;</button>
    <div id="dashboardContent"></div>
  </div>
</div>

<div class="modal-overlay" id="loginModal">
  <div class="modal center-modal">
    <button class="modal-close" onclick="closeModal('loginModal')">&times;</button>
    <h2>登录 NIAO</h2>
    <button class="wallet-connect-btn" onclick="doGoogleSignIn()">

<script>
let firebaseInitialized = false;
let db, storage, DC, TC, CC, EC, SC, RC, WC, SYSC;
let currentUser = null;
let allTasks = [];
let lang = 'zh';
let lastOpenedTaskId = null;

try {
  if(!firebase.apps.length){
    firebase.initializeApp({
      apiKey: window._0x1,
      authDomain: window._0x2,
      projectId: window._0x3,
      storageBucket: window._0x4,
      messagingSenderId: window._0x5,
      appId: window._0x6
    });
  }
  db = firebase.firestore();
  storage = firebase.storage();
  db.settings({ persistence: true });
  DC = db.collection('users');
  TC = db.collection('tasks');
  CC = db.collection('completions');
  EC = db.collection('earnStats');
  SC = db.collection('spendStats');
  RC = db.collection('bountyReplies');
  WC = db.collection('withdrawals');
  SYSC = db.collection('system');
  window.googleProvider = new firebase.auth.GoogleAuthProvider();
  window.twitterProvider = new firebase.auth.TwitterAuthProvider();
  firebaseInitialized = true;

  firebase.auth().onAuthStateChanged(async (user) => {
    if (user && !currentUser) {
      let u = await DB.getUser(user.uid);
      if (u) {
        currentUser = ensureCompleteUserData(u, user);
      } else {
        currentUser = ensureCompleteUserData({ wallet: user.uid, email: user.email, nick: user.displayName || user.email?.split('@')[0] || 'User', avatar: user.photoURL || 'https://api.dicebear.com/7.x/bottts/svg?seed=' + user.uid }, user);
        await DB.saveUser(currentUser);
      }
      localStorage.setItem('cachedUser', JSON.stringify(currentUser));
      updateUserBtn();
      renderTasks();
    }
  });

  firebase.auth().getRedirectResult().then(async (result) => {
    if (result && result.user) {
      const user = result.user;
      let u = await DB.getUser(user.uid);
      if (u) {
        currentUser = ensureCompleteUserData(u, user);
      } else {
        currentUser = ensureCompleteUserData({ wallet: user.uid, email: user.email, nick: user.displayName || user.email?.split('@')[0] || 'User', avatar: user.photoURL || 'https://api.dicebear.com/7.x/bottts/svg?seed=' + user.uid }, user);
        await DB.saveUser(currentUser);
      }
      localStorage.setItem('cachedUser', JSON.stringify(currentUser));
      updateUserBtn();
      closeModal('loginModal');
      renderTasks();
      showToast('登录成功！欢迎 ' + currentUser.nick, 'success');
    }
  }).catch(err => {
    console.error('Redirect result error:', err);
  });

  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('x_bound') === '1') {
    setTimeout(() => showToast('X 账号绑定成功！', 'success'), 500);
    window.history.replaceState({}, '', window.location.pathname);
  }
} catch(e) { console.error('Firebase init failed:', e); }

const DB = {
  async getWelcomeBonusStats() {
    if (!firebaseInitialized) return { totalClaimed: 0 };
    try {
      const snap = await SYSC.doc('welcomeBonus').get();
      if (snap.exists) return snap.data();
      await SYSC.doc('welcomeBonus').set({ totalClaimed: 0, totalNiao: 10000000000000, createdAt: Date.now() });
      return { totalClaimed: 0, totalNiao: 10000000000000 };
    } catch { return { totalClaimed: 0 }; }
  },
  async updateWelcomeBonusStats(increment) {
    if (!firebaseInitialized) return;
    try {
      await SYSC.doc('welcomeBonus').update({
        totalClaimed: firebase.firestore.FieldValue.increment(increment),
        updatedAt: Date.now()
      });
    } catch (e) { console.error(e); }
  },
  async getUser(wallet) {
    if (!wallet || !firebaseInitialized) return null;
    try {
      const snap = await DC.doc(wallet).get();
      return snap.exists ? snap.data() : null;
    } catch { return null; }
  },
  async saveUser(user) {
    if (!user || !user.wallet) return;
    if (!firebaseInitialized) return;
    try { await DC.doc(user.wallet).set(user, { merge: true }); } catch (e) { console.error(e); }
  },
  async getTasks() {
    if (!firebaseInitialized) return [];
    try {
      const snap = await TC.orderBy('createdAt', 'desc').get();
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch { return []; }
  },
  async getCompletions(wallet) {
    if (!wallet || !firebaseInitialized) return {};
    try {
      const snap = await CC.doc(wallet).get();
      return snap.exists ? snap.data() : {};
    } catch { return {}; }
  },
  async saveCompletion(wallet, taskId, data) {
    if (!wallet || !taskId || !firebaseInitialized) return;
    try { await CC.doc(wallet).set({ [taskId]: data }, { merge: true }); } catch {}
  },
  async getLeaderboard(col, limit) {
    if (!firebaseInitialized) return [];
    try {
      const snap = await col.orderBy('amount', 'desc').limit(limit || 50).get();
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch { return []; }
  },
  async saveBountyReply(taskId, text, author) {
    if (!firebaseInitialized || !taskId || !text || !author) return;
    try {
      await RC.add({
        taskId, text,
        authorWallet: author.wallet,
        authorNick: author.nick,
        authorAvatar: author.avatar,
        createdAt: Date.now()
      });
    } catch (e) { console.error(e); }
  },
  async getBountyReplies(taskId) {
    if (!firebaseInitialized || !taskId) return [];
    try {
      const snap = await RC.where('taskId', '==', taskId).orderBy('createdAt', 'asc').get();
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch { return []; }
  },
  async recordEarn(wallet, amount, userInfo) {
    if (!wallet || !firebaseInitialized) return;
    try {
      const ref = EC.doc(wallet);
      const doc = await ref.get();
      const data = { amount: (doc.data()?.amount || 0) + amount, avatar: userInfo.avatar, nick: userInfo.nick, wallet };
      await ref.set(data, { merge: true });
    } catch (e) { console.error('recordEarn error:', e); }
  },
  async recordSpend(wallet, amount, userInfo) {
    if (!wallet || !firebaseInitialized) return;
    try {
      const ref = SC.doc(wallet);
      const doc = await ref.get();
      const data = { amount: (doc.data()?.amount || 0) + amount, avatar: userInfo.avatar, nick: userInfo.nick, wallet };
      await ref.set(data, { merge: true });
    } catch (e) { console.error('recordSpend error:', e); }
  },
  async rechargeRecord(wallet, amount, txHash) {
    if (!wallet || !firebaseInitialized) return;
    try {
      await DC.doc(wallet).collection('recharges').add({
        amount, txHash, status: 'completed', createdAt: Date.now()
      });
    } catch (e) { console.error('rechargeRecord error:', e); }
  },
  async saveWithdraw(wallet, amount, address, userInfo) {
    if (!wallet || !firebaseInitialized) return;
    try {
      await WC.add({
        wallet, amount, address,
        nick: userInfo.nick,
        avatar: userInfo.avatar,
        status: 'pending',
        createdAt: Date.now()
      });
    } catch (e) { console.error('saveWithdraw error:', e); }
  }
};

function ensureCompleteUserData(user, firebaseUser) {
  if (!user) user = {};
  user.id = firebaseUser?.uid || user.id || user.wallet;
  user.wallet = firebaseUser?.uid || user.wallet;
  user.email = user.email || firebaseUser?.email;
  user.nick = user.nick || firebaseUser?.displayName || (user.email ? user.email.split('@')[0] : 'User');
  user.avatar = user.avatar || firebaseUser?.photoURL || 'https://api.dicebear.com/7.x/bottts/svg?seed=' + user.id;
  user.balance = typeof user.balance === 'number' ? user.balance : 0;
  user.pending = typeof user.pending === 'number' ? user.pending : 0;
  user.xAccount = user.xAccount || '';
  user.withdrawableBalance = typeof user.withdrawableBalance === 'number' ? user.withdrawableBalance : 0;
  user.nonWithdrawableBalance = typeof user.nonWithdrawableBalance === 'number' ? user.nonWithdrawableBalance : 0;
  user.hasClaimedWelcomeBonus = typeof user.hasClaimedWelcomeBonus === 'boolean' ? user.hasClaimedWelcomeBonus : false;
  return user;
}

function setCurrentUser(u) {
  currentUser = ensureCompleteUserData(u);
  localStorage.setItem('cachedUser', JSON.stringify(currentUser));
  updateUserBtn();
  renderTasks();
}

function showToast(msg, type) {
  const toast = document.getElementById('toastNotification');
  document.getElementById('toastMessage').textContent = msg;
  toast.style.display = 'block';
  toast.style.borderColor = type === 'error' ? 'var(--red)' : type === 'success' ? 'var(--green)' : 'var(--card-border)';
  setTimeout(() => { toast.style.display = 'none'; }, 3000);
}

function closeModal(id) { const m = document.getElementById(id); if (m) m.classList.remove('show'); }
function openModal(id) { const m = document.getElementById(id); if (m) m.classList.add('show'); }

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatNiaoAmount(amount) {
  if (!amount) return '0';
  if (amount >= 1000000000000) return (amount / 1000000000000).toFixed(2) + '万亿';
  if (amount >= 100000000) return (amount / 100000000).toFixed(2) + '亿';
  if (amount >= 10000) return (amount / 10000).toFixed(2) + '万';
  return amount.toLocaleString();
}

function getTimeAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return '刚刚';
  if (mins < 60) return mins + '分钟前';
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours + '小时前';
  return Math.floor(hours / 24) + '天前';
}

function updateUserBtn() {
  const btn = document.getElementById('mobileUserBtn');
  if (currentUser && currentUser.avatar) {
    btn.src = currentUser.avatar;
  }
}

function handleUserBtnClick() {
  if (currentUser) showDashboardModal();
  else openModal('loginModal');
}

function handleMobileDashboardClick() {
  if (currentUser) showDashboardModal();
  else {
    showToast('请先登录', 'error');
    openModal('loginModal');
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'));
  const panel = document.getElementById('panel-' + tab);
  if (panel) panel.classList.add('active');
  document.querySelectorAll('[data-tab="' + tab + '"]').forEach(b => b.classList.add('active'));
}

function toggleFab() {
  if (!currentUser) {
    showToast('请先登录', 'error');
    openModal('loginModal');
    return;
  }
  document.getElementById('fabMenu').classList.toggle('show');
}

function updateCalcTotal() {
  const p = parseInt(document.getElementById('pubParticipants').value) || 0;
  const n = parseInt(document.getElementById('pubNiaoPerPerson').value) || 0;
  document.getElementById('calcTotalValue').textContent = formatNiaoAmount(p * n) + ' NIAO';
}

function updatePublishFormVis() {
  // just visual toggle handled in checkbox onchange
}

function updateCharCount() {
  const t = document.getElementById('bountySubmissionText');
  const c = document.getElementById('bountyCharCount');
  if (t && c) c.textContent = t.value.length + '/200';
}

document.addEventListener('DOMContentLoaded', () => {
  try {
    const cached = localStorage.getItem('cachedUser');
    if (cached && !currentUser) {
      currentUser = JSON.parse(cached);
      updateUserBtn();
    }
  } catch {}

  document.querySelectorAll('[data-tab]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      if (btn.getAttribute('onclick')) return;
      switchTab(btn.dataset.tab);
    });
  });

  document.querySelectorAll('[data-lb]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-lb]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadLeaderboard(btn.dataset.lb);
    });
  });

  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) overlay.classList.remove('show');
    });
  });

  loadTasks();
  loadLeaderboard('earn');
});

async function loadTasks() {
  if (!firebaseInitialized) return;
  allTasks = await DB.getTasks();
  try {
    const stats = await DB.getWelcomeBonusStats();
    const welcomeBonus = {
      id: 'welcome-bonus',
      type: 'bounty',
      title: '万亿NIAO币大放送',
      desc: '欢迎来到NIAO社区！点击下方按钮领取10亿枚NIAO币（不可提现，可用于发布任务）',
      niaoPerPerson: 1000000000,
      totalNiao: 10000000000000,
      accepted: stats.totalClaimed || 0,
      participants: 10000,
      createdAt: Date.now() - 86400000,
      publisher: {
        wallet: 'system',
        nick: 'NIAO官方',
        avatar: 'https://api.dicebear.com/7.x/bottts/svg?seed=system'
      },
      isWelcomeBonus: true
    };
    allTasks.unshift(welcomeBonus);
  } catch (e) {
    console.error('Failed to load welcome bonus:', e);
  }
  renderTasks();
}

function renderTasks() {
  const grid = document.getElementById('taskGrid');
  const empty = document.getElementById('emptyTasks');
  if (!allTasks.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = allTasks.map(t => renderTaskCard(t)).join('');
}

function renderTaskCard(t) {
  const isWelcomeBonus = t.isWelcomeBonus || t.id === 'welcome-bonus';
  const isBounty = t.type === 'bounty' || isWelcomeBonus;
  const reward = t.niaoPerPerson || t.reward || 0;
  const accepted = (t.accepted || 0);
  const maxAccepted = t.maxAccepted || t.participants || 999;
  const isFull = accepted >= maxAccepted;
  const tags = [];
  if (t.actionType) {
    if (t.actionType.follow) tags.push('<span class="task-action-tag tag-follow">关注</span>');
    if (t.actionType.like) tags.push('<span class="task-action-tag tag-like">点赞</span>');
    if (t.actionType.retweet) tags.push('<span class="task-action-tag tag-retweet">转发</span>');
  }
  let badgeText = '';
  if (isWelcomeBonus) badgeText = '<div class="bounty-badge">⭐ 欢迎奖励</div>';
  else if (isBounty) badgeText = '<div class="bounty-badge">⭐ 特殊悬赏</div>';
  return `
    <div class="task-card ${isBounty ? 'bounty-special' : ''}" onclick="openTaskDetail('${t.id}')">
      ${badgeText}
      <div class="task-card-header">
        <div class="task-title">${esc(t.title || (t.desc || '').substring(0, 30) || '任务')}</div>
        <div class="task-reward">${formatNiaoAmount(reward)}</div>
      </div>
      ${tags.length ? '<div class="task-action-tags">' + tags.join('') + '</div>' : ''}
      <div class="task-meta">
        <span>👤 ${esc((t.publisher && t.publisher.nick) || t.publisherNick || '匿名')}</span>
        <span>📊 ${accepted}/${maxAccepted}</span>
        <span>🕐 ${getTimeAgo(t.createdAt)}</span>
      </div>
      <div class="task-desc">${esc(t.desc || '')}</div>
      <div class="task-footer">
        <div class="task-publisher">
          <img src="${esc((t.publisher && t.publisher.avatar) || t.publisherAvatar || 'https://api.dicebear.com/7.x/bottts/svg?seed=default')}" alt="">

/* Auth */
async function doGoogleSignIn() {
  try {
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    let result;
    if (isMobile) {
      await firebase.auth().signInWithRedirect(window.googleProvider);
      return;
    } else {
      result = await firebase.auth().signInWithPopup(window.googleProvider);
    }
    const user = result.user;
    let u = await DB.getUser(user.uid);
    if (u) {
      currentUser = ensureCompleteUserData(u, user);
    } else {
      currentUser = ensureCompleteUserData({ wallet: user.uid, email: user.email, nick: user.displayName || user.email?.split('@')[0] || 'User', avatar: user.photoURL || 'https://api.dicebear.com/7.x/bottts/svg?seed=' + user.uid }, user);
      await DB.saveUser(currentUser);
    }
    localStorage.setItem('cachedUser', JSON.stringify(currentUser));
    updateUserBtn();
    closeModal('loginModal');
    renderTasks();
    showToast('登录成功！欢迎 ' + currentUser.nick, 'success');
  } catch (e) {
    console.error('Google sign in error:', e);
    if (e.code === 'auth/popup-closed-by-user' || e.code === 'auth/cancelled-popup-request') {
      try {
        await firebase.auth().signInWithRedirect(window.googleProvider);
        return;
      } catch (e2) {
        console.error('Redirect fallback failed:', e2);
      }
    }
    showToast('登录失败: ' + (e.message || ''), 'error');
  }
}

async function doBindX() {
  if (!currentUser) {
    showToast('请先登录', 'error');
    closeModal('bindXModal');
    openModal('loginModal');
    return;
  }
  try {
    const apiBase = window.location.protocol + '//' + window.location.host;
    const response = await fetch(apiBase + '/api/auth/twitter', { method: 'GET', credentials: 'include' });
    if (!response.ok) throw new Error('Failed to get auth URL');
    const { redirectUrl } = await response.json();
    const width = Math.min(600, window.innerWidth);
    const height = Math.min(700, window.innerHeight);
    const left = window.screenX + (window.outerWidth - width) / 2;
    const top = window.screenY + (window.outerHeight - height) / 2;
    const popup = window.open(redirectUrl, 'Twitter OAuth', `width=${width},height=${height},left=${left},top=${top},popup=yes`);
    if (!popup || popup.closed) {
      showToast('正在跳转 X 授权...', 'info');
      window.location.href = redirectUrl;
      return;
    }
    showToast('请在弹出窗口中完成授权...', 'info');
    const pollTimer = setInterval(async () => {
      try {
        if (popup.closed) {
          clearInterval(pollTimer);
          const freshUser = await DB.getUser(currentUser.wallet);
          if (freshUser?.xAccount) {
            currentUser.xAccount = freshUser.xAccount;
          }
          localStorage.setItem('cachedUser', JSON.stringify(currentUser));
          showToast('X 账号绑定成功！', 'success');
          closeModal('bindXModal');
        }
      } catch {}
    }, 1000);
  } catch (e) {
    console.error('Bind X error:', e);
    showToast('X 授权失败: ' + e.message, 'error');
  }
}

/* Wallet */
async function connectWallet(type) {
  let provider, ethereumProvider;
  try {
    if (type === 'metamask') {
      if (!window.ethereum) { showToast('请安装 MetaMask', 'error'); return; }
      ethereumProvider = window.ethereum;
      provider = new ethers.BrowserProvider(window.ethereum);
    } else if (type === 'okx') {
      if (window.okxwallet) {
        ethereumProvider = window.okxwallet;
        provider = new ethers.BrowserProvider(window.okxwallet);
      } else if (window.ethereum) {
        ethereumProvider = window.ethereum;
        provider = new ethers.BrowserProvider(window.ethereum);
      } else { showToast('请安装 OKX Wallet', 'error'); return; }
    } else if (type === 'trust') {
      if (window.trustwallet) {
        ethereumProvider = window.trustwallet;
        provider = new ethers.BrowserProvider(window.trustwallet);
      } else if (window.ethereum) {
        ethereumProvider = window.ethereum;
        provider = new ethers.BrowserProvider(window.ethereum);
      } else { showToast('请安装 Trust Wallet', 'error'); return; }
    } else { return; }

    showToast('连接钱包中...', 'info');
    const accounts = await ethereumProvider.request({ method: 'eth_requestAccounts' });
    const addr = accounts[0];
    if (!addr) { showToast('未获取到地址', 'error'); return; }

    try {
      await ethereumProvider.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x38' }] });
    } catch {}

    const existingUser = await DB.getUser(addr);
    const INITIAL_BONUS = 1000000000;
    setCurrentUser({
      wallet: addr,
      nick: existingUser?.nick || addr.slice(0, 6) + '...' + addr.slice(-4),
      avatar: existingUser?.avatar || 'https://api.dicebear.com/7.x/bottts/svg?seed=' + addr.slice(2, 8),
      balance: existingUser?.balance ?? INITIAL_BONUS,
      pending: existingUser?.pending || 0,
      xAccount: existingUser?.xAccount || '',
      walletType: type,
      withdrawableBalance: existingUser?.withdrawableBalance ?? 0,
      nonWithdrawableBalance: existingUser?.nonWithdrawableBalance ?? INITIAL_BONUS
    });
    await DB.saveUser(currentUser);
    closeModal('loginModal');
    showToast('钱包连接成功！', 'success');
  } catch (e) {
    console.error('connectWallet error:', e);
    if (e.code === 4001) showToast('已取消连接', 'error');
    else showToast('连接失败: ' + (e.message || ''), 'error');
  }
}

  document.getElementById('rechargeAmount').value = '';
  openModal('rechargeModal');
}

async function switchToBSC(walletProvider) {
  try {
    await walletProvider.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x38' }] });
    return true;
  } catch (switchError) {
    if (switchError.code === 4902) {
      try {
        await walletProvider.request({
          method: 'wallet_addEthereumChain',
          params: [{ chainId: '0x38', chainName: 'BSC', nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 }, rpcUrls: ['https://bsc-dataseed.binance.org/'], blockExplorerUrls: ['https://bscscan.com'] }]
        });
        return true;
      } catch { return false; }
    }
    return false;
  }
}

async function doRecharge() {
  if (!currentUser) { showToast('请先登录', 'error'); return; }
  const amountInput = document.getElementById('rechargeAmount');
  const amount = parseInt(amountInput.value);
  if (!amount || amount <= 0) { showToast('请输入有效数量', 'error'); return; }

  try {
    let walletProvider;
    if (currentUser.walletType === 'okx' && window.okxwallet) walletProvider = window.okxwallet;
    else if (currentUser.walletType === 'trust' && window.trustwallet) walletProvider = window.trustwallet;
    else if (window.ethereum) walletProvider = window.ethereum;
    else if (window.okxwallet) walletProvider = window.okxwallet;
    else { showToast('请先连接钱包', 'error'); return; }

    showToast('切换到 BSC...', 'info');
    const switched = await switchToBSC(walletProvider);
    if (!switched) { showToast('请切换到 BSC 网络', 'error'); return; }

    const provider = new ethers.BrowserProvider(walletProvider);
    const signer = await provider.getSigner();
    const userAddress = await signer.getAddress();

    const transferAmount = ethers.parseUnits(amount.toString(), 18);
    const recipientHex = RECIPIENT_ADDRESS.substring(2).padStart(64, '0');
    const amountHex = ethers.toBeHex(transferAmount).substring(2).padStart(64, '0');
    const txData = { from: userAddress, to: TOKEN_CONTRACT, data: '0xa9059cbb' + recipientHex + amountHex };

    showToast('打开钱包...', 'info');
    const txHash = await walletProvider.request({ method: 'eth_sendTransaction', params: [txData] });

    currentUser.withdrawableBalance = (currentUser.withdrawableBalance || 0) + amount;
    currentUser.balance = (currentUser.balance || 0) + amount;
    await DB.saveUser(currentUser);
    localStorage.setItem('cachedUser', JSON.stringify(currentUser));

    closeModal('rechargeModal');
    showToast('充值处理中，等待链上确认', 'success');

    provider.waitForTransaction(txHash, 1, 60000).then(async (receipt) => {
      if (receipt && receipt.status === 1) {
        await DB.rechargeRecord(currentUser.wallet, amount, txHash);
        showToast('充值已确认', 'success');
      }
    }).catch(err => console.error(err));
  } catch (error) {
    console.error('Recharge failed:', error);
    if (error.code === 4001) showToast('已取消', 'error');
    else showToast('充值失败: ' + (error.message || ''), 'error');
  }
}

/* Withdraw */
function openWithdraw() {
  if (!currentUser) { openModal('loginModal'); return; }
  closeModal('dashboardModal');
  document.getElementById('withdrawAvail').textContent = formatNiaoAmount(currentUser.withdrawableBalance || 0);
  document.getElementById('withdrawAddr').value = '';
  document.getElementById('withdrawAmount').value = '';
  openModal('withdrawModal');
}

async function doWithdraw() {
  if (!currentUser) return;
  const addr = (document.getElementById('withdrawAddr').value || '').trim();
  const amt = parseInt(document.getElementById('withdrawAmount').value) || 0;
  if (!addr) { showToast('请输入提现地址', 'error'); return; }
  if (amt < 1) { showToast('请输入金额', 'error'); return; }
  const withdrawableBalance = (currentUser.withdrawableBalance || 0);
  if (amt > withdrawableBalance) { showToast('可提现余额不足', 'error'); return; }

  await DB.saveWithdraw(currentUser.wallet, amt, addr, currentUser);
  currentUser.withdrawableBalance = (currentUser.withdrawableBalance || 0) - amt;
  currentUser.balance = (currentUser.balance || 0) - amt;
  await DB.saveUser(currentUser);
  localStorage.setItem('cachedUser', JSON.stringify(currentUser));
  closeModal('withdrawModal');
  showToast('提现申请已提交', 'success');
}

function consumeMobileBalance(amount) {
  currentUser.balance = currentUser.balance || 0;
  currentUser.nonWithdrawableBalance = currentUser.nonWithdrawableBalance || 0;
  currentUser.withdrawableBalance = currentUser.withdrawableBalance || 0;
  let remaining = amount;
  if (currentUser.nonWithdrawableBalance > 0 && remaining > 0) {
    const consumeFromNonWithdrawable = Math.min(currentUser.nonWithdrawableBalance, remaining);
    currentUser.nonWithdrawableBalance -= consumeFromNonWithdrawable;
    remaining -= consumeFromNonWithdrawable;
  }
  if (currentUser.withdrawableBalance > 0 && remaining > 0) {
    const consumeFromWithdrawable = Math.min(currentUser.withdrawableBalance, remaining);
    currentUser.withdrawableBalance -= consumeFromWithdrawable;
    remaining -= consumeFromWithdrawable;
  }
  if (remaining > 0) return false;
  currentUser.balance = currentUser.nonWithdrawableBalance + currentUser.withdrawableBalance;
  return true;
}

async function doPublishSocial() {
  if (!currentUser) return;
  const desc = (document.getElementById('pubSocialDesc').value || '').trim();
  const tweetUrl = (document.getElementById('pubTweetUrl').value || '').trim();
  const profileUrl = (document.getElementById('pubProfileUrl').value || '').trim();
  const participants = parseInt(document.getElementById('pubParticipants').value) || 0;
  const niaoPerPerson = parseInt(document.getElementById('pubNiaoPerPerson').value) || 0;
  const actionChecks = document.querySelectorAll('#socialTaskTypes input:checked');
  if (!desc) { showToast('请输入任务描述', 'error'); return; }
  if (actionChecks.length === 0) { showToast('请选择至少一种任务类型', 'error'); return; }
  if (participants < 1) { showToast('请输入参与人数', 'error'); return; }
  if (niaoPerPerson < 1) { showToast('请输入单人奖励', 'error'); return; }
  const total = participants * niaoPerPerson;
  if ((currentUser.balance || 0) < total) { showToast('NIAO余额不足', 'error'); return; }

  if (!consumeMobileBalance(total)) { showToast('NIAO余额不足', 'error'); return; }

  const actionType = {};
  actionChecks.forEach(cb => { actionType[cb.value] = true; });
  const actions = Array.from(actionChecks).map(cb => cb.value);

  await DB.saveUser(currentUser);
  await DB.recordSpend(currentUser.wallet, total, currentUser);

  const newTask = {
    type: 'social',
    desc,
    title: desc.substring(0, 30),
    tweetUrl, profileUrl,
    actionType,
    actions,
    participants,
    niaoPerPerson,
    totalNiao: total,
    publisher: {
      wallet: currentUser.wallet,
      nick: currentUser.nick,
      avatar: currentUser.avatar,
      xAccount: currentUser.xAccount
    },
    publisherWallet: currentUser.wallet,
    publisherNick: currentUser.nick,
    publisherAvatar: currentUser.avatar,
    accepted: 0,
    maxAccepted: participants,
    createdAt: Date.now()
  };
  await TC.add(newTask);
  await loadTasks();
  await loadLeaderboard('spend');
  closeModal('publishSocialModal');
  localStorage.setItem('cachedUser', JSON.stringify(currentUser));
  showToast('任务发布成功！', 'success');
}
