<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X 账号绑定中...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  .container {
    text-align: center;
    padding: 2rem;
  }
  .spinner {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255, 255, 255, 0.1);
    border-top-color: #F5A623;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 1.5rem;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  p { color: #888; font-size: 0.9rem; }
  .success { color: #2ECC71; }
  .error { color: #E74C3C; }
</style>
</head>
<body>
<div class="container" id="container">
  <div class="spinner"></div>
  <h1>正在完成 X 授权...</h1>
  <p id="message">请稍候</p>
</div>

<script>
const container = document.getElementById('container');
const message = document.getElementById('message');
const urlParams = new URLSearchParams(window.location.search);
const success = urlParams.get('success');
const username = urlParams.get('username');
const error = urlParams.get('error');

async function processCallback() {
  if (error) {
    let errorMsg = '授权失败';
    if (error === 'missing_params') errorMsg = '缺少必要参数';
    if (error === 'invalid_state') errorMsg = '无效的授权状态';
    if (error === 'auth_failed') errorMsg = '授权验证失败';
    
    container.innerHTML = `
      <h1 class="error">${errorMsg}</h1>
      <p>请重新尝试绑定 X 账号</p>
      <p style="margin-top: 1rem; color: #888;">页面将在3秒后关闭...</p>
    `;
    setTimeout(() => window.close(), 3000);
    return;
  }

  if (success === '1' && username) {
    container.innerHTML = `
      <h1 class="success">✅ 授权成功！</h1>
      <p>X 账号 @${decodeURIComponent(username)} 已绑定</p>
      <p style="margin-top: 1rem; color: #888;">页面即将关闭...</p>
    `;

    if (window.opener) {
      window.opener.postMessage({
        type: 'X_BIND_SUCCESS',
        username: decodeURIComponent(username)
      }, '*');
    }

    setTimeout(() => {
      const parentUrl = localStorage.getItem('x_bind_return_url') || 'bounty.html';
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
      let finalUrl = parentUrl;
      if (isMobile && !parentUrl.includes('bounty-mobile')) {
        finalUrl = parentUrl.replace('bounty.html', 'bounty-mobile.html');
      }
      const redirectUrl = `${finalUrl}?x_bound=1&username=${encodeURIComponent(username)}`;
      window.location.href = redirectUrl;
    }, 1500);
  } else {
    container.innerHTML = `
      <h1 class="error">授权失败</h1>
      <p>缺少必要参数</p>
      <p style="margin-top: 1rem; color: #888;">页面将在3秒后关闭...</p>
    `;
    setTimeout(() => window.close(), 3000);
  }
}

processCallback();
</script>
</body>
</html>
